<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>if(location.protocol==='http:')location.replace('https://voidcipher.cn'+location.pathname+location.search)</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>VOIDCIPHER — 游戏库</title>
<style>
  :root, [data-theme="dark"] {
    --bg-deeper: #080a0c;
    --bg-primary: #0c0f14;
    --bg-elevated: #12161d;
    --text-primary: #d4c9a8;
    --text-secondary: #8a7e6b;
    --text-muted: #564e40;
    --accent: #c8a84e;
    --accent-dim: #8a7235;
    --border: #1e241c;
    --font-mono: 'Courier New', 'Source Code Pro', 'Consolas', monospace;
    --font-system: system-ui, -apple-system, sans-serif;
  }

  [data-theme="light"] {
    --bg-deeper: #f2efe8;
    --bg-primary: #faf9f5;
    --bg-elevated: #ffffff;
    --text-primary: #3d3420;
    --text-secondary: #6b5e45;
    --text-muted: #9e8f70;
    --accent: #8a7235;
    --accent-dim: #b8973e;
    --border: #d8d0bf;
  }

  [data-theme="light"] body::before,
  [data-theme="light"] body::after,
  [data-theme="light"] .noise { display: none; }

  [data-theme="light"] .brand {
    text-shadow: 0 0 20px rgba(138,114,53,0.15), 0 0 4px rgba(138,114,53,0.1);
  }
  [data-theme="light"] .secret-reveal { text-shadow: 0 0 12px rgba(138,114,53,0.5); }
  [data-theme="light"] .game-card-icon { text-shadow: 0 0 8px rgba(138,114,53,0.15); }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deeper);
    color: var(--text-primary);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 17px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    animation: scanline-drift 8s linear infinite;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
  }
  @keyframes scanline-drift { 0%{transform:translateY(0)} 100%{transform:translateY(4px)} }

  .noise {
    position: fixed; inset: 0; z-index: 9997; pointer-events: none; opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .shell { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; position: relative; z-index: 1; }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border); padding: 2.5rem 0 2rem; margin-bottom: 3rem;
    display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;
  }
  .header-left { display: flex; flex-direction: column; gap: 0.25rem; }
  .brand {
    font-size: 2.5rem; letter-spacing: 0.3em; font-weight: 700; color: var(--accent);
    text-shadow: 0 0 40px rgba(200,168,78,0.3), 0 0 8px rgba(200,168,78,0.2);
    line-height: 1.2;
  }
  .brand:hover { animation: glitch-shift 0.3s ease-in-out; }

  .secret-reveal {
    font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.15em;
    color: var(--accent); text-shadow: 0 0 12px rgba(200,168,78,0.6);
    opacity: 0; transform: translateY(2px); transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none; user-select: none;
  }
  .secret-reveal.visible { opacity: 1; transform: translateY(0); }

  @keyframes glitch-shift {
    0%{transform:translate(0)}20%{transform:translate(-3px,2px)}40%{transform:translate(3px,-1px)}60%{transform:translate(-2px,1px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0)}
  }
  .tagline { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.25em; }
  .status-line { font-size: 0.72rem; color: var(--text-secondary); letter-spacing: 0.15em; opacity: 0.7; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; margin-right: 0.35rem; animation: blink 2s step-end infinite;
    box-shadow: 0 0 6px var(--accent); vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* Admin btn */
  .btn-admin, .theme-toggle {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 1.2rem; font-family: var(--font-mono); font-size: 0.85rem;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
    text-decoration: none;
  }
  .btn-admin:hover, .theme-toggle:hover { border-color: var(--accent-dim); background: rgba(200,168,78,0.06); color: var(--accent); }
  .btn-admin:focus-visible, .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .header-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

  .zoom-hint {
    font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.08em;
    white-space: nowrap; opacity: 0.55; transition: opacity 0.3s;
  }
  .zoom-hint:hover { opacity: 1; }

  /* Filter Bar */
  .filter-bar {
    display: flex; gap: 0; margin-bottom: 1px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filter-btn {
    font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.12em;
    padding: 0.6rem 1.4rem; background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text-secondary); border-color: var(--accent-dim); background: rgba(200,168,78,0.04); }
  .filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(200,168,78,0.08); }
  .filter-btn .count { color: var(--text-muted); font-size: 0.7rem; margin-left: 0.3rem; }

  /* Game Grid */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .game-card {
    background: var(--bg-primary); padding: 1.5rem; transition: background 0.2s;
    text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 0.75rem;
    position: relative; overflow: hidden;
  }
  .game-card:hover { background: var(--bg-elevated); }
  .game-card:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .game-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0;
    background: var(--accent); transition: height 0.25s ease;
  }
  .game-card:hover::before { height: 100%; }
  .game-card-icon {
    font-size: 2rem; color: var(--accent); line-height: 1;
    text-shadow: 0 0 12px rgba(200,168,78,0.3);
  }
  .game-card-title { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-primary); }
  .game-card-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
  .game-card-meta {
    display: flex; gap: 1rem; font-size: 0.78rem; color: var(--text-muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .game-card-arrow {
    align-self: flex-end; color: var(--accent-dim); font-size: 0.85rem;
    transition: transform 0.2s, color 0.2s;
  }
  .game-card:hover .game-card-arrow { transform: translateX(4px); color: var(--accent); }

  /* Empty state */
  .game-grid.empty::after {
    content: '// 游戏库暂无内容 · 按 Ctrl+Shift+A 进入管理后台添加游戏';
    grid-column: 1 / -1; display: block; padding: 4rem 1.5rem; text-align: center;
    color: var(--text-muted); font-size: 0.88rem; letter-spacing: 0.12em; background: var(--bg-primary);
  }

  /* Footer */
  .footer {
    margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .footer-left, .footer-right { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .footer-right span { margin-left: 1.5rem; }

  /* Responsive */
  @media (max-width: 640px) {
    .shell { padding: 1rem 1rem 4rem; }
    .brand { font-size: 1.8rem; letter-spacing: 0.2em; }
    .game-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
    .brand:hover { animation: none; }
  }
</style>
</head>
<body data-theme="dark">

<div class="noise"></div>

<div class="shell">

  <header class="header">
    <div class="header-left">
      <span class="brand" id="brandTitle">VOIDCIPHER</span>
      <span class="secret-reveal" id="secretReveal">破雾之箭，直击靶心</span>
      <span class="tagline">文字解密 · 游戏库</span>
      <span class="status-line"><span class="status-dot"></span>NODE ACTIVE</span>
    </div>
    <div class="header-actions">
      <span class="zoom-hint">页面大小不舒服可以用 Ctrl + + 或 - 调整大小</span>
      <button class="theme-toggle" id="themeToggle" title="切换浅色/暗色模式" aria-label="切换浅色/暗色模式">◐ 浅色</button>
      <a href="donate.html" class="btn-admin">支持</a>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <!-- 筛选项由 JS 动态生成 -->
  </div>
  <div class="game-grid" id="gameGrid">
    <!-- 游戏卡片由 JS 动态渲染 -->
  </div>

  <footer class="footer">
    <div class="footer-left">VOIDCIPHER v0.6.0</div>
    <div class="footer-right">
      <span>EST. 2026</span>
      <span>NODE: HK-03</span>
    </div>
  </footer>

</div>

<script>
  const GAMES = [
    {
      title: '黑盒',
      path: '题库/blackbox.html',
      icon: '◣',
      desc: '寻找失踪的程序员',
      category: '逻辑推理',
      difficulty: '简单'
    },
    {
      title: '艾伦·克罗斯谜案',
      path: '题库/WHO/index.html',
      icon: '◎',
      desc: '调查神秘的艾伦·克罗斯失踪事件。浏览维基百科风格的档案页面，在冷战密码、低语计划和遗失作品之间寻找线索，揭开真相。',
      category: '模拟解密',
      difficulty: '简单'
    },
    {
      title: '码农老李遇害案',
      path: '题库/KILLMEBABY/index.html',
      icon: '◉',
      desc: '老码农论坛惊现命案，在帖子、回复和代码片段中挖掘蛛丝马迹，找出凶手。',
      category: '逻辑推理',
      difficulty: '简单'
    },
    {
      title: '密文电台',
      path: '%E9%A2%98%E5%BA%93/cipher_radio/index.html',
      icon: '◈',
      desc: '从易到难的入门级别密码解密',
      category: '密码解密',
      difficulty: '入门'
    },
    {
      title: '古墓密文',
      path: '%E9%A2%98%E5%BA%93/3/index.html',
      icon: '⬡',
      desc: '考古解密终端，从易到难破译古代墓葬中的神秘密码',
      category: '密码解密',
      difficulty: '入门'
    },
    {
      title: '谁是叛徒',
      path: '%E9%A2%98%E5%BA%93/shop/index.html',
      icon: '◆',
      desc: '聊天室风格的社交推理游戏，在对话中找出隐藏的叛徒',
      category: '逻辑推理',
      difficulty: '简单'
    },
    {
      title: '录取通知',
      path: '%E9%A2%98%E5%BA%93/4/index.html',
      icon: '▣',
      desc: '在模拟桌面上调查神秘录取通知背后的真相',
      category: '模拟推理',
      difficulty: '简单'
    },
    {
      title: '消失的人',
      path: '%E9%A2%98%E5%BA%93/haveren/index.html',
      icon: '◇',
      desc: '在模拟系统中追查一个凭空消失的人',
      category: '模拟推理',
      difficulty: '入门'
    },
    {
      title: '反向图灵',
      path: '%E9%A2%98%E5%BA%93/tu0/index.html',
      icon: '⊗',
      desc: '打破第四面墙的元游戏——是谁在测试谁？',
      category: 'META',
      difficulty: '中等'
    }
  ];

  function renderFilterBar() {
    const diffs = [...new Set(GAMES.map(g => g.difficulty || '其他'))];
    const counts = {};
    GAMES.forEach(g => { const d = g.difficulty || '其他'; counts[d] = (counts[d] || 0) + 1; });

    const bar = document.getElementById('filterBar');
    bar.innerHTML = [
      `<button class="filter-btn active" data-filter="*">全部<span class="count">${GAMES.length}</span></button>`,
      ...diffs.map(d => `<button class="filter-btn" data-filter="${escapeAttr(d)}">${escapeHtml(d)}<span class="count">${counts[d]}</span></button>`)
    ].join('');

    bar.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        renderGameLibrary(filter === '*' ? null : filter);
      });
    });
  }

  function renderGameLibrary(filterDifficulty = null) {
    const grid = document.getElementById('gameGrid');
    const filtered = filterDifficulty
      ? GAMES.filter(g => (g.difficulty || '其他') === filterDifficulty)
      : GAMES;

    if (filtered.length === 0) {
      grid.className = 'game-grid empty';
      grid.innerHTML = '';
      return;
    }

    grid.className = 'game-grid';
    grid.innerHTML = filtered.map(g => `
      <a href="${escapeAttr(g.path)}" class="game-card" target="_blank">
        <div class="game-card-icon">${escapeHtml(g.icon || '◇')}</div>
        <div class="game-card-title">${escapeHtml(g.title)}</div>
        <div class="game-card-desc">${escapeHtml(g.desc || '暂无简介')}</div>
        <div class="game-card-meta">
          <span>${escapeHtml(g.category || '未分类')}</span>
          <span>难度 · ${escapeHtml(g.difficulty || '中等')}</span>
        </div>
        <span class="game-card-arrow">进入游戏 →</span>
      </a>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ── Theme Toggle ── */
  (function() {
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('voidcipher-theme');
    if (saved) body.dataset.theme = saved;
    updateBtn();

    btn.addEventListener('click', () => {
      const next = body.dataset.theme === 'dark' ? 'light' : 'dark';
      body.dataset.theme = next;
      localStorage.setItem('voidcipher-theme', next);
      updateBtn();
    });

    function updateBtn() {
      const isDark = body.dataset.theme === 'dark';
      btn.innerHTML = isDark ? '◐ 浅色' : '◑ 暗色';
      btn.title = isDark ? '切换浅色模式' : '切换暗色模式';
      btn.setAttribute('aria-label', btn.title);
    }
  })();

  (function() {
    const brand = document.getElementById('brandTitle');
    const secret = document.getElementById('secretReveal');
    let revealed = false;

    document.addEventListener('mouseup', () => {
      if (revealed) return;
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount || sel.isCollapsed) return;
      try {
        if (brand && sel.containsNode(brand, true)) {
          secret.classList.add('visible');
          revealed = true;
          setTimeout(() => { secret.classList.remove('visible'); revealed = false; }, 4000);
        }
      } catch (e) {}
    });

    // 移动端 touch 支持
    document.addEventListener('touchend', () => {
      if (revealed) return;
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount || sel.isCollapsed) return;
      try {
        if (brand && sel.containsNode(brand, true)) {
          secret.classList.add('visible');
          revealed = true;
          setTimeout(() => { secret.classList.remove('visible'); revealed = false; }, 4000);
        }
      } catch (e) {}
    });
  })();

  renderFilterBar();
  renderGameLibrary();
</script>

</body>
</html>
