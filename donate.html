<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDCIPHER — 支持开发者</title>
<style>
  :root {
    --bg-deeper: #080a0c;
    --bg-primary: #0c0f14;
    --bg-elevated: #12161d;
    --text-primary: #d4c9a8;
    --text-secondary: #8a7e6b;
    --text-muted: #564e40;
    --accent: #c8a84e;
    --accent-dim: #8a7235;
    --success: #4e8a5e;
    --border: #1e241c;
    --font-mono: 'Courier New', 'Source Code Pro', 'Consolas', monospace;
    --font-system: system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deeper);
    color: var(--text-primary);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    animation: scanline-drift 8s linear infinite;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
  }
  @keyframes scanline-drift { 0%{transform:translateY(0)} 100%{transform:translateY(4px)} }

  .noise {
    position: fixed; inset: 0; z-index: 9997; pointer-events: none; opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .shell { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; position: relative; z-index: 1; }

  /* Back link */
  .back-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    color: var(--text-muted); text-decoration: none; font-size: 0.78rem;
    letter-spacing: 0.15em; transition: color 0.2s; margin-bottom: 2.5rem;
  }
  .back-link:hover { color: var(--accent); }

  /* Header */
  .page-header {
    border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2.5rem; position: relative;
  }
  .page-header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 30%; height: 1px;
    background: var(--accent); opacity: 0.6;
  }
  .page-title {
    font-size: 1.4rem; letter-spacing: 0.2em; color: var(--accent); font-weight: 700;
    text-shadow: 0 0 30px rgba(200,168,78,0.2);
  }
  .page-sub {
    font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.25em; margin-top: 0.4rem;
  }

  /* Intro */
  .intro {
    font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8;
    margin-bottom: 2.5rem; padding: 1.5rem; border: 1px solid var(--border);
    background: var(--bg-primary);
  }
  .intro strong { color: var(--text-primary); }

  /* Section label */
  .section-label {
    font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 1rem; font-family: var(--font-system); font-weight: 600;
  }

  /* Payment Methods */
  .pay-methods {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border); margin-bottom: 1.5rem;
  }
  .pay-method {
    background: var(--bg-primary); padding: 2rem 1.5rem; text-align: center;
    cursor: pointer; transition: all 0.2s; border: none; color: var(--text-primary);
    font-family: var(--font-mono);
  }
  .pay-method:hover { background: var(--bg-elevated); }
  .pay-method.selected {
    background: rgba(200,168,78,0.06);
    box-shadow: inset 0 0 0 1px var(--accent-dim);
  }
  .pay-method:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .pay-icon { font-size: 2rem; margin-bottom: 0.5rem; color: var(--accent); }
  .pay-name { font-size: 0.85rem; letter-spacing: 0.1em; font-weight: 600; }
  .pay-hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.25rem; }

  /* QR / Payment Info */
  .pay-info {
    background: var(--bg-primary); border: 1px solid var(--border); padding: 2rem;
    text-align: center; margin-bottom: 1.5rem; display: none;
  }
  .pay-info.active { display: block; }
  .qr-placeholder {
    width: 180px; height: 180px; margin: 1rem auto;
    border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 0.7rem; letter-spacing: 0.1em;
    background: var(--bg-deeper);
  }
  .qr-placeholder img { width: 100%; height: 100%; object-fit: contain; }
  .pay-account {
    font-size: 0.82rem; color: var(--text-secondary); margin-top: 1rem; letter-spacing: 0.08em;
  }

  /* Footer */
  .footer {
    margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .footer-left, .footer-right { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.1em; }
  .footer-right span { margin-left: 1.5rem; }

  @media (max-width: 640px) {
    .shell { padding: 1rem 1rem 4rem; }
    .page-title { font-size: 1.1rem; }
    .pay-methods { grid-template-columns: 1fr; }
    .pay-method { padding: 1.25rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
  }
</style>
</head>
<body>

<div class="noise"></div>

<div class="shell">

  <a href="index.html" class="back-link">← 返回游戏库</a>

  <header class="page-header">
    <h1 class="page-title">SUPPORT</h1>
    <p class="page-sub">支持开发者 · 让 VOIDCIPHER 继续运转</p>
  </header>

  <div class="intro">
    <p>VOIDCIPHER 是一个独立开发的文字解密游戏平台。所有游戏永久免费，但服务器、域名和开发时间需要成本。如果你喜欢这里的游戏，可以考虑<strong>请开发者喝杯咖啡</strong>——无论金额大小，都是莫大的鼓励。</p>
  </div>

  <!-- Payment -->
  <div class="section-label">支付方式</div>
  <div class="pay-methods" id="payMethods">
    <button class="pay-method selected" data-method="wechat">
      <div class="pay-icon">◈</div>
      <div class="pay-name">微信支付</div>
      <div class="pay-hint">WeChat Pay</div>
    </button>
    <button class="pay-method" data-method="alipay">
      <div class="pay-icon">◉</div>
      <div class="pay-name">支付宝</div>
      <div class="pay-hint">Alipay</div>
    </button>
  </div>

  <!-- QR Info -->
  <div class="pay-info active" id="payInfoWechat">
    <div class="qr-placeholder" id="qrWechat">
      <span>请将收款二维码图片<br>放入 E:\website\donate\wechat.png</span>
    </div>
    <p class="pay-account">使用微信扫描二维码即可完成支付</p>
  </div>
  <div class="pay-info" id="payInfoAlipay">
    <div class="qr-placeholder" id="qrAlipay">
      <span>请将收款二维码图片<br>放入 E:\website\donate\alipay.png</span>
    </div>
    <p class="pay-account">使用支付宝扫描二维码即可完成支付</p>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-left">VOIDCIPHER · 感谢每一位支持者</div>
    <div class="footer-right"><span>EST. 2026</span></div>
  </footer>
</div>

<script>
  // Payment method switcher
  document.getElementById('payMethods').addEventListener('click', function(e) {
    const btn = e.target.closest('.pay-method');
    if (!btn) return;

    document.querySelectorAll('.pay-method').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    const method = btn.dataset.method;
    document.querySelectorAll('.pay-info').forEach(p => p.classList.remove('active'));
    document.getElementById('payInfo' + (method === 'wechat' ? 'Wechat' : 'Alipay')).classList.add('active');
  });

  // Load QR images if exist
  function tryLoadQR(method) {
    const img = new Image();
    img.onload = function() {
      const placeholder = document.getElementById('qr' + (method === 'wechat' ? 'Wechat' : 'Alipay'));
      placeholder.innerHTML = '';
      placeholder.appendChild(img.cloneNode());
    };
    img.src = `donate/${method}.png`;
  }
  tryLoadQR('wechat');
  tryLoadQR('alipay');
</script>

</body>
</html>
