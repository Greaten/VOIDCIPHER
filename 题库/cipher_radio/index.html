<title>密文电台 | CIPHER RADIO — 短波解密终端</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@font-face{font-family:'Terminal';src:local('Courier New'),local('Consolas'),local('monospace')}
:root{--amber:#ffb000;--amber-dim:#7a5500;--green:#33ff33;--green-dim:#1a661a;--red:#ff3333;--cyan:#00cccc;--bg:#0a0a0a;--surface:#111111;--text:#c0c0a0;--glow-amber:0 0 10px rgba(255,176,0,0.4);--glow-green:0 0 10px rgba(51,255,51,0.4)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Terminal','Courier New',Consolas,monospace;font-size:14px;line-height:1.55;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(0,0,0,0) 60%,rgba(0,0,0,0.5) 100%);pointer-events:none;z-index:9998}
.noise{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9997}
#app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}
header{background:var(--surface);border-bottom:1px solid #222;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.station-id{color:var(--amber);font-size:12px;letter-spacing:2px;animation:flicker 4s infinite}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.3}94%{opacity:1}96%{opacity:0.6}97%{opacity:1}}
.freq{color:var(--green-dim);font-size:10px}
.header-right{display:flex;align-items:center;gap:12px}
.progress-bar{width:160px;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);transition:width 0.5s ease;box-shadow:0 0 6px var(--green)}
.progress-text{color:var(--green-dim);font-size:11px;min-width:38px;text-align:right}
.signal{display:flex;align-items:flex-end;gap:2px;height:12px}
.signal-bar{width:3px;background:var(--green);animation:signalPulse 0.8s ease-in-out infinite}
.signal-bar:nth-child(1){height:5px;animation-delay:0s}
.signal-bar:nth-child(2){height:8px;animation-delay:0.15s}
.signal-bar:nth-child(3){height:11px;animation-delay:0.3s}
.signal-bar:nth-child(4){height:7px;animation-delay:0.45s}
.signal-bar:nth-child(5){height:12px;animation-delay:0.6s}
@keyframes signalPulse{0%,100%{opacity:0.4}50%{opacity:1}}
#display{flex:1;overflow-y:auto;padding:12px 20px;scroll-behavior:smooth}
#display::-webkit-scrollbar{width:3px}
#display::-webkit-scrollbar-track{background:transparent}
#display::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.line{padding:1px 0;white-space:pre-wrap;word-break:break-all}
.line.system{color:var(--green);font-weight:bold}
.line.narrative{color:var(--text);opacity:0.9}
.line.cipher{color:var(--cyan);font-size:17px;letter-spacing:1px;font-weight:bold;text-shadow:0 0 8px rgba(0,204,204,0.5)}
.line.hint{color:#888;font-style:italic}
.line.success{color:var(--green);text-shadow:var(--glow-green)}
.line.error{color:var(--red)}
.line.divider{color:#333;padding:4px 0}
.line.prompt{color:var(--amber)}
.line.warn{color:var(--red);text-shadow:0 0 6px rgba(255,51,51,0.4)}
.glitch{position:relative;color:var(--amber);text-shadow:0 0 6px rgba(255,176,0,0.6)}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;opacity:0}
.glitch:hover::before{opacity:0.3;color:#0ff;animation:glitchShift 0.3s ease;clip-path:inset(40% 0 50% 0)}
.glitch:hover::after{opacity:0.3;color:#f0f;animation:glitchShift 0.2s ease reverse;clip-path:inset(60% 0 30% 0)}
@keyframes glitchShift{0%{transform:translate(0)}20%{transform:translate(-3px,2px)}40%{transform:translate(3px,-1px)}60%{transform:translate(-2px,-2px)}80%{transform:translate(2px,1px)}100%{transform:translate(0)}}
#input-area{background:var(--surface);border-top:1px solid #222;padding:8px 16px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.prompt-symbol{color:var(--green);font-weight:bold;font-size:13px}
#cmd-input{flex:1;background:transparent;border:none;outline:none;color:var(--amber);font-family:inherit;font-size:14px;caret-color:var(--amber)}
#cmd-input::placeholder{color:#444}
.cmd-hint{color:#444;font-size:10px;padding-left:2px;flex-shrink:0}
#victory-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);z-index:10000;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 1.5s ease}
#victory-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.victory-title{font-size:34px;color:var(--amber);text-shadow:0 0 20px rgba(255,176,0,0.8),0 0 40px rgba(255,176,0,0.4);margin-bottom:16px;letter-spacing:3px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.victory-text{color:var(--text);font-size:14px;text-align:center;max-width:600px;line-height:1.8;margin-bottom:24px}
.victory-stamp{color:var(--red);border:3px solid var(--red);padding:12px 36px;font-size:22px;letter-spacing:3px;transform:rotate(-8deg);text-shadow:0 0 10px rgba(255,51,51,0.6);opacity:0.85}
@media(max-width:768px){body{font-size:12px}header{padding:6px 10px}#display{padding:10px 12px}#input-area{padding:6px 10px}.progress-bar{width:80px}}
</style>
