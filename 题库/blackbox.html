/* ===== CRT OVERLAY ===== */
@keyframes crt-jitter{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(0.5px,-0.3px)}
  40%{transform:translate(-0.4px,0.2px)}
  60%{transform:translate(0.3px,0.4px)}
  80%{transform:translate(-0.2px,-0.1px)}
}

#crt-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9997;
  background:
    radial-gradient(ellipse at center, rgba(255,220,150,0.04) 0%, rgba(255,180,80,0.07) 50%, rgba(20,10,0,0.10) 100%),
    radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.38) 100%);
  box-shadow:inset 0 0 200px rgba(0,0,0,0.35);
  animation:crt-jitter 8s infinite ease-in-out;
}

#crt-overlay::before{
  content:'';
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.09) 2px,
    rgba(0,0,0,0.09) 4px
  );
}

#crt-overlay::after{
  content:'';
  position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

  mix-blend-mode:overlay;
  background-size:256px 256px;
}

          '个人日记.txt':{ type:'file', content:`2026年6月1日  晴

今天是 Echo 项目第三阶段的第一天。说实话，我很兴奋。
我们花了两年时间构建的神经映射接口终于要投入实际测试了。
今天完成了 S-0001 的首次映射——一个45岁的男性志愿者。
整个过程持续了约3小时，意识传输完整度达到了91%。
团队开了香槟。Dr. Wei 说这是"人类进化的下一步"。

我当时觉得他说得对。

─────────────────────────

2026年6月3日  多云

今天复查 S-0001 的数据时发现了一些不太对劲的地方。
意识映射的完整度报告显示是91%，但我看了原始日志——
在传输的最后7分钟里，数据流出现了异常的振荡模式。
像是……挣扎。

我向 Wei 提了这个问题。他说这是正常的神经信号波动。
"就像人睡觉时也会抽搐一样。"他笑着说。

但我查了文献。这种振荡模式在已知的意识传输研究中被定义为
"意识抗拒"。意味着数据源——那个实验体——在抗拒这个过程。

可他是"志愿者"啊。志愿者为什么要抗拒？

─────────────────────────

2026年6月5日  阴

张伟（同组的研究员，坐我隔壁工位）今天突然被调走了。
没有任何预兆。他的工位上午还是满的，下午就空了。
HR 说他"被调到了海外分部"。

我给张伟发消息，他的账号已经停用了。微信也不回。

张伟上周和我一起发现了 S-0003 的招募文件有问题。
上面写着"志愿者补偿金 5000元"，但收款人那一栏——
我仔细看了——是一个名为"城市资源管理"的第三方公司。
不是个人账户。是公司在"卖"人。

他刚发现，就被调走了。

我开始害怕了。

─────────────────────────

2026年6月8日  雨

今天被"请"去开了一个安全审查会议。
Dr. Wei 带了两个安保的人站在门口。全程站着。

他问我为什么访问 S-0007 的完整档案。
我说是技术需要——S-0007 的意识响应模式和其他实验体不同。

他不信。

他说："林，你的好奇心对公司来说是一种风险。从现在起，
你的访问权限仅限于你需要的部分。明白吗？"

我说"明白"。但我已经把所有数据复制到了个人云存储。

回家路上绕了三圈。那辆黑色轿车还在后面。

我把 Mochi 的猫粮多买了三袋。

─────────────────────────

2026年6月10日  凌晨

有人动过我家门锁。锁孔里有新鲜的划痕。
我换了锁。但我不知道能撑多久。

今天完成了 S-0012 的映射。整个过程我都在观察——
从头到尾，实验体的眼睛是睁着的。他被注射了麻醉剂，
但那不是麻醉。那是神经麻痹剂。他的意识清醒，
只是身体不能动。

他全程是醒着的。他感觉了一切。

我录了像。我存下来了。这是证据。

─────────────────────────

2026年6月12日  凌晨2点

今天把 Mochi 送到了小雨家。猫不能留在这里。
如果他们要进来，至少猫不在。

我写了辞职信，加密保存在 Documents 文件夹里。

财务流水、内部通讯记录。全部。上传到了云存储。

如果我不能手动取消，48小时后这些会自动发给
三家媒体和网络安全机构。

但我不知道我能不能活到48小时后。

─────────────────────────

2026年6月14日  凌晨3:47

他们来找我了。楼下的车还没熄火。
我的选择不多。

我不会跑。跑了他们就会销毁证据。
我也不会投降。投降了他们就会让我"消失"。

我选择第三条路。

Echo 系统的映射接口我比任何人都熟悉。
我修改了 S-0021 的参数——那是下一个实验体的编号。

我要把自己上传进 Echo。

一旦进去，我就和证据在一起了。
他们无法删除我。
除非他们关闭整个系统。

而我赌他们舍不得。

如果你读到了这些，请把证据带出去。
Documents\Project_Echo 里有你需要的一切。

— 林晨` },

function getCWDNode() {
  let node = FS;
  for (let i = 1; i < state.cwd.length; i++) {
    if (!node.children || !node.children[state.cwd[i]]) return null;
    node = node.children[state.cwd[i]];
  }
  return node;
}

function getCWDString() {
  return state.cwd.join('\\');
}

function findLockedByPassword(password) {
  const normalized = password.trim().toLowerCase();
  const results = [];
  function search(node, pPath) {
    if (!node) return;
    if (node.type === 'file' && node.locked && node.passwordHash === normalized) {
      results.push({ node, path: pPath });
    }
    if (node.children) {
      for (const [name, child] of Object.entries(node.children)) {
        search(child, pPath ? pPath + '\\' + name : name);
      }
    }
  }
  search(FS, '');
  return results;
}

function isUnlocked(filePath) {
  return state.unlocked[filePath.toLowerCase()] === true;
}

function markUnlocked(filePath) {
  state.unlocked[filePath.toLowerCase()] = true;
  const fpLower = filePath.toLowerCase();
  if (fpLower.includes('辞职信')) state.notepadPhase = Math.max(state.notepadPhase, 1);
  if (fpLower.includes('readme')) state.notepadPhase = Math.max(state.notepadPhase, 2);
  if (fpLower.includes('加密证据包.dat')) {
    state.gameComplete = true;
    state.notepadPhase = 3;
    document.getElementById('desk-red-alert').classList.add('on');
    setTimeout(() => showEndingModal(), 1000);
  }
  saveState();
  updateDesktopIcons();
}

let zIndexCounter = 20;
const windowRegistry = {};
let dragTarget = null;

function getNextZ() { return ++zIndexCounter; }

function createWindowHTML(id, title, bodyHTML, width, height, left, top) {
  const existing = document.getElementById('win-' + id);
  if (existing) {
    existing.style.display = 'flex';
    existing.style.zIndex = getNextZ();
    updateTaskbarButtons();
    if (id === 'terminal') { setTimeout(() => document.getElementById('cmd-input')?.focus(), 100); }
    if (id === 'explorer') { setTimeout(() => renderExplorer(), 100); }
    if (id === 'notepad') { setTimeout(() => renderNotepad(), 100); }
    return;
  }

  const win = document.createElement('div');
  win.className = 'window-95';
  win.id = 'win-' + id;
  win.style.width = width + 'px';
  win.style.height = height + 'px';
  win.style.left = left + 'px';
  win.style.top = top + 'px';
  win.style.zIndex = getNextZ();
  win.dataset.winId = id;
  win.innerHTML = `
    <div class="win-titlebar" data-win-id="${id}">
      <span class="win-title-text">${title}</span>
      <button class="win-btn" data-action="minimize" data-win="${id}">_</button>
      <button class="win-btn" data-action="close" data-win="${id}">X</button>
    </div>
    ${bodyHTML}
  `;
  document.getElementById('desktop').appendChild(win);

  const titlebar = win.querySelector('.win-titlebar');
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    dragTarget = win;
    const rect = win.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    win.style.zIndex = getNextZ();
    updateTaskbarButtons();
    e.preventDefault();
  });

  titlebar.addEventListener('touchstart', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    dragTarget = win;
    const rect = win.getBoundingClientRect();
    dragOffsetX = e.touches[0].clientX - rect.left;
    dragOffsetY = e.touches[0].clientY - rect.top;
    win.style.zIndex = getNextZ();
    updateTaskbarButtons();
  }, {passive: false});

  win.querySelectorAll('.win-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const wid = btn.dataset.win;
      if (action === 'minimize') minimizeWindow(wid);
      if (action === 'close') closeWindow(wid);
    });
  });

  win.addEventListener('mousedown', () => {
    win.style.zIndex = getNextZ();
    updateTaskbarButtons();
  });

  windowRegistry[id] = win;
  updateTaskbarButtons();
}

document.addEventListener('mousemove', (e) => {
  if (!dragTarget) return;
  dragTarget.style.left = (e.clientX - dragOffsetX) + 'px';
  dragTarget.style.top = (e.clientY - dragOffsetY) + 'px';
});

document.addEventListener('mouseup', () => { dragTarget = null; });

document.addEventListener('touchmove', (e) => {
  if (!dragTarget) return;
  const t = e.touches[0];
  dragTarget.style.left = (t.clientX - dragOffsetX) + 'px';
  dragTarget.style.top = (t.clientY - dragOffsetY) + 'px';
}, {passive: false});

document.addEventListener('touchend', () => { dragTarget = null; });

function minimizeWindow(id) {
  const win = document.getElementById('win-' + id);
  if (win) { win.style.display = 'none'; }
  updateTaskbarButtons();
}

function closeWindow(id) {
  const win = document.getElementById('win-' + id);
  if (win) { win.style.display = 'none'; }
  updateTaskbarButtons();
}

function restoreWindow(id) {
  const win = document.getElementById('win-' + id);
  if (win) {
    win.style.display = 'flex';
    win.style.zIndex = getNextZ();
    if (id === 'terminal') { setTimeout(() => document.getElementById('cmd-input')?.focus(), 100); }
  }
  updateTaskbarButtons();
}

function updateTaskbarButtons() {
  const container = document.getElementById('window-buttons');
  container.innerHTML = '';
  for (const [id, win] of Object.entries(windowRegistry)) {
    if (!win || !win.parentNode) continue;
    const btn = document.createElement('button');
    btn.className = 'taskbar-btn' + (win.style.display !== 'none' ? ' active' : '');
    btn.textContent = win.querySelector('.win-title-text')?.textContent || id;
    btn.onclick = () => {
      if (win.style.display === 'none') {
        restoreWindow(id);
      } else if (win.style.zIndex == zIndexCounter) {
        minimizeWindow(id);
      } else {
        restoreWindow(id);
      }
    };
    container.appendChild(btn);
  }
}

          openReaderWindow(readerId, displayName, content, isLocked);

function cmd_ls(args) {
  let node = getCWDNode();

  if (!node || !node.children || Object.keys(node.children).length === 0) {
    addLine('system', '(空目录)');
    return;
  }

  const entries = Object.entries(node.children).sort((a, b) => {
    if (a[1].type !== b[1].type) return a[1].type === 'dir' ? -1 : 1;
    return a[0].localeCompare(b[0]);
  });

  addLine('system', ' 目录: ' + getCWDString());
  addLine('system', '');
  for (const [name, child] of entries) {
    if (child.type === 'dir') {
      addLine('dir', '  [目录]  ' + name + '/');
    } else {
      const fp = getCWDString() + '\\' + name;
      if (child.locked && !isUnlocked(fp)) {
        addLine('locked', '  [加密]  ' + name);
      } else if (child.locked && isUnlocked(fp)) {
        addLine('success', '  [解密]  ' + name);
      } else {
        addLine('file', '  [文件]  ' + name);
      }
    }
  }
}

function cmd_cd(args) {
  if (args.length === 0) {
    state.cwd = [...DEFAULT_CWD];
    updatePrompt();
    saveState();
    addLine('system', '已返回初始目录。');
    return;
  }

  const pathStr = args.join(' ');
  if (pathStr === '..') {
    if (state.cwd.length <= 2) { addLine('error', '已在根目录。'); return; }
    state.cwd.pop();
    updatePrompt();
    saveState();
    addLine('system', '已进入: ' + getCWDString());
    return;
  }

  const cwdNode = getCWDNode();
  let target = cwdNode?.children?.[pathStr];
  if (!target) {
    const lower = pathStr.toLowerCase();
    for (const [name, child] of Object.entries(cwdNode?.children || {})) {
      if (name.toLowerCase() === lower) { target = child; break; }
    }
  }

  if (!target || target.type !== 'dir') {
    addLine('error', '目录不存在: ' + pathStr);
    return;
  }

  state.cwd.push(pathStr);
  updatePrompt();
  saveState();
  addLine('system', '已进入: ' + getCWDString());
}

function cmd_cat(args) {
  if (args.length === 0) { addLine('error', '用法: cat <文件名>'); return; }
  const filename = args.join(' ');
  const cwdNode = getCWDNode();
  if (!cwdNode?.children) { addLine('error', '当前目录不可读。'); return; }

  let target = cwdNode.children[filename];
  if (!target) {
    const lower = filename.toLowerCase();
    for (const [name, child] of Object.entries(cwdNode.children)) {
      if (name.toLowerCase() === lower) { target = child; break; }
    }
  }

  if (!target) { addLine('error', '文件不存在: ' + filename); return; }
  if (target.type === 'dir') { addLine('error', filename + ' 是一个目录。使用 cd 进入。'); return; }

  const filePath = getCWDString() + '\\' + filename;

  if (target.locked && !isUnlocked(filePath)) {

  addLine('system', String.fromCharCode(9553) + ' ' + filename + ' ' + String.fromCharCode(9553));
  addLines('file', target.content);
  addLine('system', String.fromCharCode(9553) + ' 文件结束 ' + String.fromCharCode(9553));

  if (isUnlocked(readmePath) && !state.hasReadReadme) hints.push('项目真相_README.md 已解锁。cat 它——里面藏着最终密码。');
  if (state.hasReadReadme && !isUnlocked(finalPath)) hints.push('README 泄露了加密证据包.dat 的密码。在同一个目录下 unlock 它。');
  if (isUnlocked(finalPath) && !state.gameComplete) hints.push('最终文件已解锁。cat 加密证据包.dat 看看 Lin 留下的真相。');
  if (state.gameComplete) hints.push('案件已破。inventory 查看证据清单。感谢你的坚持。');
  if (hints.length === 0) hints.push('四处探索。ls 看文件，cd 切换目录，cat 阅读内容，unlock 解锁加密文件。');

  state.hintCount = (state.hintCount || 0) + 1;
  saveState();
  addLine('warn', '提示 (' + state.hintCount + '): ' + hints[Math.min(state.hintCount - 1, hints.length - 1)]);
}

function cmd_inventory() {
  addLine('system', String.fromCharCode(9552).repeat(7) + ' 调查档案 ' + String.fromCharCode(9552).repeat(7));

  const unlockedItems = [];
  function collect(node, pPath) {
    if (!node) return;
    if (node.type === 'file' && node.locked && isUnlocked(pPath)) {
      unlockedItems.push({ name: node.name, path: pPath, final: node.final });
    }
    if (node.children) {
      for (const [name, child] of Object.entries(node.children)) {
        collect(child, pPath ? pPath + '\\' + name : name);
      }
    }
  }
  collect(FS, '');

  if (unlockedItems.length > 0) {
    addLine('system', '');
    addLine('success', '已解密的文件:');
    for (const item of unlockedItems) {
      addLine('success', '  [v] ' + item.path);
    }
  }

  const readFiles = [];
  if (state.hasReadDiary) readFiles.push('个人日记.txt');
  if (state.hasReadReport) readFiles.push('Echo项目周报.docx');
  if (state.hasReadTestLogs) readFiles.push('实验测试日志.txt');
  if (state.hasReadResignation) readFiles.push('辞职信_已加密.txt');
  if (state.hasReadReadme) readFiles.push('项目真相_README.md');

  if (readFiles.length > 0) {
    addLine('system', '');
    addLine('system', '已查阅的文件:');
    for (const f of readFiles) addLine('file', '  [·] ' + f);
  }

  if (state.gameComplete) {
    addLine('system', '');
    addLine('magic', '案件状态: 已破获');
    addLine('magic', 'Lin Chen (S-0021) 意识仍在 Echo 服务器运行');
    addLine('magic', '证据: /data/subjects/evidence.tar.gz');
    addLine('magic', '密钥: ZT-LIN-7749');
  }

  if (unlockedItems.length === 0 && !state.gameComplete) {
    addLine('system', '暂无关键发现。继续探索。');
  }
  addLine('system', String.fromCharCode(9552).repeat(27));
}

function cmd_help() {
  addLines('system', [
    String.fromCharCode(9552).repeat(7) + ' 可用命令 ' + String.fromCharCode(9552).repeat(7),
    '',
    '  ls            列出当前目录的文件',
    '  cd <目录>     切换目录 (.. 返回上级)',
    '  cat <文件>    查看文件内容',
    '  unlock <密码> 解锁加密文件',
    '  hint          获取调查提示',
    '  inventory     查看已收集的线索',
    '  clear         清屏',
    '  help          显示本帮助',
    '',
    '提示: 文件名区分大小写。探索每个文件夹。',
  ].join('\n'));
}

function cmd_clear() {
  const out = getTermOut();
  if (out) out.innerHTML = '';
}

function processCommand(raw) {
  const cmd = raw.trim();
  if (!cmd) return;
  echoCommand(cmd);
  const parts = cmd.match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g) || [];
  const main = parts[0].toLowerCase();
  const args = parts.slice(1).map(a => a.replace(/^["']|["']$/g, ''));

  switch(main) {
    case 'ls': case 'dir': cmd_ls(args); break;
    case 'cd': cmd_cd(args); break;
    case 'cat': case 'type': cmd_cat(args); break;
    case 'unlock': cmd_unlock(args); break;
    case 'hint': cmd_hint(); break;
    case 'inventory': case 'inv': cmd_inventory(); break;
    case 'help': cmd_help(); break;
    case 'clear': case 'cls': cmd_clear(); break;
    default:
      addLine('error', '未知命令: ' + main);
      addLine('system', '输入 help 查看可用命令。');
  }
}

function glitch(mode) {
  const overlay = document.getElementById('glitch-overlay');
  if (!overlay) return;
  overlay.classList.add(mode || 'active');
  setTimeout(() => overlay.classList.remove(mode || 'active'), mode ? 200 : 120);
}
