<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATIONEYE · 案件调查系统</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --card: #fafafa;
  --border: #e0e0e4;
  --divider: #eeeef0;
  --text: #1d1d1f;
  --text-dim: #6e6e73;
  --text-faint: #999;
  --accent: #d35400;
  --accent-dim: #a04000;
  --accent-bg: rgba(211,84,0,0.06);
  --accent-bg-hover: rgba(211,84,0,0.12);
  --danger: #c0392b;
  --danger-bg: rgba(192,57,43,0.04);
  --success: #1a8a4a;
  --info: #2563eb;
  --info-bg: rgba(37,99,235,0.05);
  --topbar-h: 44px;
  --left-w: 64px;
  --right-w: 340px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #eeeef0;
  font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden; height: 100vh;
  color: var(--text); font-size: 15px; line-height: 1.7;
}

/* Top Bar */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h); background: #fafafa;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; z-index: 100; gap: 10px;
}
#topbar .logo { font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: 1px; cursor: pointer; }
#topbar .logo span { color: var(--accent); }
#topbar .sep { color: var(--text-faint); font-size: 18px; margin: 0 2px; }
#topbar .subtitle { font-size: 13px; color: var(--text-dim); letter-spacing: 0.5px; }
#topbar .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
#topbar .case-id { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 1px; }
#topbar .back-btn {
  font-size: 12px; color: var(--text-dim); cursor: pointer;
  background: none; border: 1px solid var(--border); padding: 2px 10px; border-radius: 3px;
}
#topbar .back-btn:hover { color: var(--text); border-color: #555; }

/* Layout */
#main { display: flex; height: calc(100vh - var(--topbar-h)); margin-top: var(--topbar-h); }

/* Left Nav */
#left-nav {
  width: var(--left-w); background: #f8f8fa;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 0; gap: 2px; flex-shrink: 0;
}
.nav-item {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; cursor: pointer; color: var(--text-dim);
  font-size: 20px; transition: all 0.2s; position: relative;
}
.nav-item:hover { color: var(--text); background: rgba(0,0,0,0.04); }
.nav-item.active { color: var(--accent); background: var(--accent-bg); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}

/* Center */
#center { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
#center-header {
  padding: 16px 24px 12px; border-bottom: 1px solid var(--divider); flex-shrink: 0;
}
#center-header h2 { font-size: 18px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
#center-header .src-type { font-size: 12px; color: var(--text-faint); letter-spacing: 1.5px; margin-top: 2px; }
#center-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* Right Panel */
#right-panel {
  width: var(--right-w); background: #fafafa;
  border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;
  position: relative;
}
#right-header {
  padding: 14px 16px; border-bottom: 1px solid var(--divider); flex-shrink: 0;
}
#right-header h3 { font-size: 14px; font-weight: 600; color: var(--text-dim); letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
#right-header .count { color: var(--accent); font-size: 13px; font-weight: 700; }
#evidence-list { flex: 1; overflow-y: auto; padding: 8px; }
.evidence-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
  cursor: pointer; transition: all 0.15s; position: relative;
}
.evidence-card:hover { border-color: #bbb; }
.evidence-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.evidence-card.assigned { opacity: 0.45; border-style: dashed; cursor: not-allowed; }
.evidence-card .ev-source { font-size: 11px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 3px; }
.evidence-card .ev-text { font-size: 14px; color: var(--text); line-height: 1.5; }
.evidence-card .ev-icon { position: absolute; top: 8px; right: 10px; font-size: 10px; color: var(--accent); }
#empty-evidence { text-align: center; color: var(--text-faint); padding: 48px 16px; font-size: 14px; line-height: 2; }

#deduction-trigger {
  margin: 8px 12px 12px; padding: 12px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 6px; font-size: 15px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s; flex-shrink: 0;
}
#deduction-trigger:hover { background: var(--accent-dim); }

/* Content Shared Styles */
.chat-msg { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--divider); }
.chat-msg:last-child { border-bottom: none; }
.chat-msg .c-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.chat-msg .c-sender { font-weight: 600; font-size: 14px; color: var(--text); }
.chat-msg .c-time { font-size: 12px; color: var(--text-faint); margin-left: auto; }
.chat-msg .c-body { color: var(--text-dim); font-size: 15px; line-height: 1.8; }
.chat-msg.warn { background: var(--danger-bg); padding: 10px 12px; border-radius: 6px; border: none; margin-bottom: 12px; }
.chat-section-label { font-size: 12px; color: var(--text-faint); letter-spacing: 1px; padding: 8px 0; margin-bottom: 8px; border-bottom: 1px solid var(--divider); }

.email-list-item { padding: 12px; border-bottom: 1px solid var(--divider); cursor: pointer; transition: background 0.15s; border-radius: 4px; }
.email-list-item:hover { background: rgba(0,0,0,0.02); }
.email-list-item .e-subject { font-size: 15px; font-weight: 600; color: var(--text); }
.email-list-item .e-meta { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
.email-detail { margin-top: 10px; padding: 14px; background: var(--card); border-radius: 6px; border: 1px solid var(--border); display: none; font-size: 15px; color: var(--text-dim); line-height: 1.9; }
.email-detail.open { display: block; }

.cal-event { display: flex; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--divider); gap: 12px; }
.cal-event .cal-time { font-size: 14px; font-weight: 600; color: var(--accent); min-width: 48px; }
.cal-event .cal-desc { flex: 1; }
.cal-event .cal-title { font-size: 15px; color: var(--text); }
.cal-event .cal-loc { font-size: 12px; color: var(--text-faint); }
.cal-event.warn { background: var(--danger-bg); padding: 8px 12px; border-radius: 4px; border: none; }

.commit { padding: 10px 0; border-bottom: 1px solid var(--divider); font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 13px; }
.commit .c-hash { color: var(--accent); }
.commit .c-author { color: var(--info); }
.commit .c-date { color: var(--text-faint); font-size: 12px; }
.commit .c-msg { color: var(--text); margin: 3px 0; }
.commit .c-diff { font-size: 12px; color: var(--success); margin-top: 2px; }
.commit .c-meta { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
.commit.flagged { background: var(--danger-bg); padding: 10px 12px; border-radius: 4px; border: none; }

.hr-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.hr-card .hr-name { font-size: 18px; font-weight: 700; color: var(--text); }
.hr-card .hr-role { font-size: 13px; color: var(--info); margin-bottom: 10px; }
.hr-card .hr-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; color: var(--text-dim); border-bottom: 1px solid var(--divider); }
.hr-card .hr-row:last-child { border-bottom: none; }
.hr-card .hr-val { color: var(--text); font-weight: 500; }
.hr-card .hr-val.danger { color: var(--danger); }
.hr-card .hr-val.success { color: var(--success); }

.surv-entry { display: flex; gap: 12px; padding: 10px 12px; border-radius: 6px; margin-bottom: 6px; background: var(--card); border: 1px solid var(--border); }
.surv-entry .surv-time { font-size: 14px; font-weight: 700; color: var(--accent); min-width: 44px; }
.surv-entry .surv-detail { flex: 1; }
.surv-entry .surv-loc { font-size: 12px; color: var(--text-faint); margin-bottom: 2px; }
.surv-entry .surv-desc { font-size: 14px; color: var(--text-dim); }
.surv-entry.flagged { border-color: var(--danger); background: var(--danger-bg); }

.clue { color: var(--accent); border-bottom: 1px dashed var(--accent); padding: 0 2px; cursor: pointer; transition: all 0.15s; border-radius: 2px; }
.clue:hover { background: var(--accent-bg-hover); }
.clue.collected { color: var(--success); border-bottom: 1px solid var(--success); cursor: default; }
.clue.collected:hover { background: transparent; }
.ctx-note { font-size: 12px; color: var(--text-faint); margin-top: 4px; font-style: italic; }

/* Deduction Overlay */
#deduction-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 500; display: none; align-items: center; justify-content: center; }
#deduction-overlay.open { display: flex; }
#deduction-panel { width: 660px; max-height: 82vh; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 32px; overflow-y: auto; }
#deduction-panel h2 { text-align: center; font-size: 18px; color: var(--text); margin-bottom: 4px; }
#deduction-panel .subtitle { text-align: center; font-size: 13px; color: var(--text-faint); margin-bottom: 24px; }
.deduction-narrative { font-size: 16px; color: var(--text-dim); line-height: 2.4; }
.deduction-blank { display: inline-block; min-width: 100px; border-bottom: 2px dashed var(--accent); padding: 0 10px; margin: 0 3px; color: var(--accent); cursor: pointer; text-align: center; font-weight: 600; transition: all 0.15s; border-radius: 2px; }
.deduction-blank:hover { background: var(--accent-bg); }
.deduction-blank.active { outline: 2px solid var(--accent); outline-offset: 2px; background: var(--accent-bg); }
.deduction-blank.filled { border-bottom: 2px solid var(--success); color: var(--success); cursor: pointer; }
.deduction-blank.filled:hover { background: rgba(39,174,96,0.08); }
#submit-btn { display: block; width: 220px; margin: 28px auto 0; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s; }
#submit-btn:hover { background: var(--accent-dim); }
#result-area { text-align: center; margin-top: 16px; font-size: 15px; font-weight: 600; }
#close-deduction, #next-case-btn { display: block; margin: 12px auto 0; background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 24px; border-radius: 4px; cursor: pointer; font-size: 13px; }
#close-deduction:hover, #next-case-btn:hover { border-color: #999; color: var(--text); }

/* Title Screen */
#title-screen { position: fixed; inset: 0; background: #eeeef0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#title-screen h1 { font-size: 48px; font-weight: 700; color: var(--text); letter-spacing: 3px; margin-bottom: 4px; }
#title-screen h1 span { color: var(--accent); }
#title-screen .tagline { font-size: 16px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 48px; }
.case-grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
.case-card {
  width: 260px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; cursor: pointer; transition: all 0.2s;
  position: relative;
}
.case-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,0,0,0.08); transform: translateY(-2px); }
.case-card.locked { opacity: 0.4; cursor: not-allowed; }
.case-card.locked:hover { border-color: var(--border); transform: none; box-shadow: none; }
.case-card .case-num { font-size: 11px; color: var(--text-faint); letter-spacing: 2px; margin-bottom: 8px; }
.case-card .case-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.case-card .case-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
.case-card .case-difficulty { font-size: 12px; color: var(--accent); }
.case-card .case-status {
  position: absolute; top: 16px; right: 16px;
  font-size: 20px;
}
.case-card .case-lock { position: absolute; top: 16px; right: 16px; font-size: 18px; color: var(--text-faint); }

/* Toast */
.toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); color: var(--text); padding: 8px 20px; border-radius: 4px; font-size: 14px; z-index: 600; animation: toastIn 0.25s ease, toastOut 0.25s ease 1.8s forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-12px); } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="title-screen">
  <h1>NATION<span>EYE</span></h1>
  <div class="tagline">案件调查系统</div>
  <div class="case-grid" id="case-grid"></div>
</div>

<!-- Top Bar -->
<div id="topbar" style="display:none;">
  <div class="logo" onclick="showTitle()">NATION<span>EYE</span></div>
  <span class="sep">·</span>
  <div class="subtitle" id="topbar-subtitle">案件调查</div>
  <div class="topbar-right">
    <button class="back-btn" onclick="showTitle()">← 案件列表</button>
    <div class="case-id" id="topbar-case-id"></div>
  </div>
</div>

<!-- Main Layout -->
<div id="main" style="display:none;">
  <div id="left-nav"></div>
  <div id="center">
    <div id="center-header">
      <h2 id="center-title"></h2>
      <div class="src-type" id="center-subtitle"></div>
    </div>
    <div id="center-body"></div>
  </div>
  <div id="right-panel">
    <div id="right-header"><h3>📋 证据档案 <span class="count" id="ev-count">0</span></h3></div>
    <div id="evidence-list"><div id="empty-evidence">在数据源中点击<br><span style="color:var(--accent);">橙色高亮文字</span><br>收集证据</div></div>
    <button id="deduction-trigger" onclick="openDeduction()">构建案情报告</button>
  </div>
</div>

<!-- Deduction Overlay -->
<div id="deduction-overlay">
  <div id="deduction-panel">
    <h2>📋 案情推理报告</h2>
    <div class="subtitle">点击空白处，然后从右侧证据档案中选择一项</div>
    <div class="deduction-narrative" id="deduction-text"></div>
    <button id="submit-btn" onclick="submitDeduction()">提交推理</button>
    <div id="result-area"></div>
    <button id="close-deduction" onclick="closeDeduction()">返回调查</button>
    <button id="next-case-btn" onclick="goNextCase()" style="display:none;">进入下一案件 →</button>
  </div>
</div>

let unlockedCases = JSON.parse(localStorage.getItem('nationeye_unlocked') || '["case001","case002","case003","case004","case005"]');

function saveProgress() {
  localStorage.setItem('nationeye_done', JSON.stringify(completedCases));
  localStorage.setItem('nationeye_unlocked', JSON.stringify(unlockedCases));
}

function unlockCase(caseId) {
  if (!unlockedCases.includes(caseId)) {
    unlockedCases.push(caseId);
    saveProgress();
  }
}

// ==================== HELPERS ====================
function C(id, text) {
  return `<span class="clue${collected[id] ? ' collected' : ''}" data-clue="${id}">${text}</span>`;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function toggleEmail(el) {
  const d = el.querySelector('.email-detail');
  if (!d) return;
  d.classList.toggle('open');
  if (d.classList.contains('open')) bindCluesIn(d);
}

function bindCluesIn(container) {
  container.querySelectorAll('.clue:not(.collected)').forEach(el => {
    if (!el.dataset.bound) { el.dataset.bound = '1'; el.addEventListener('click', e => { e.stopPropagation(); collectClue(el.dataset.clue); }); }
  });
}

// ==================== TITLE SCREEN ====================
function showTitle() {
  document.getElementById('title-screen').style.display = 'flex';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('deduction-overlay').classList.remove('open');
  currentCase = null;
  renderCaseGrid();
}

function renderCaseGrid() {
  const grid = document.getElementById('case-grid');
  grid.innerHTML = '';
  const caseIds = Object.keys(CASES);
  for (const id of caseIds) {
    const c = CASES[id];
    const done = completedCases.includes(id);
    const unlocked = unlockedCases.includes(id);
    // Auto-unlock next case after previous is completed
    const isLocked = false; // All cases unlocked
    grid.innerHTML += `
      <div class="case-card ${isLocked ? 'locked' : ''}" ${isLocked ? '' : `onclick="startCase('${id}')"`}>
        <div class="case-num">案件 ${c.num}</div>
        ${done ? '<div class="case-status">✅</div>' : (isLocked ? '<div class="case-lock">🔒</div>' : '')}
        <div class="case-title">${c.title}</div>
        <div class="case-subtitle">${c.subtitle}</div>
        <div class="case-difficulty">${'★'.repeat(c.difficulty)}${'☆'.repeat(4 - c.difficulty)}</div>
      </div>`;
  }
}

// ==================== CASE START ====================
function startCase(caseId) {
  currentCase = CASES[caseId];
  collected = {};
  answers = {};
  currentSource = '';
  selectedClue = null;
  activeBlank = null;

  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('main').style.display = 'flex';
  document.getElementById('topbar-case-id').textContent = currentCase.caseLabel;

  // Build nav
  const nav = document.getElementById('left-nav');
  nav.innerHTML = '';
  for (const src of currentCase.navOrder) {
    const s = currentCase.sources[src];
    nav.innerHTML += `<div class="nav-item" data-app="${src}" title="${s.title}" onclick="switchSource('${src}')">${s.icon}</div>`;
  }

  // Reset right panel
  document.getElementById('evidence-list').innerHTML = '<div id="empty-evidence">在数据源中点击<br><span style="color:var(--accent);">橙色高亮文字</span><br>收集证据</div>';
  document.getElementById('ev-count').textContent = '0';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('next-case-btn').style.display = 'none';
  document.getElementById('deduction-overlay').classList.remove('open');

  // Open first source
  switchSource(currentCase.navOrder[0]);
}

// ==================== SOURCE SWITCHING ====================
function switchSource(src) {
  currentSource = src;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-app="${src}"]`);
  if (navItem) navItem.classList.add('active');

  const s = currentCase.sources[src];
  document.getElementById('center-title').textContent = s.icon + ' ' + s.title;
  document.getElementById('center-subtitle').textContent = s.sub;

  const body = document.getElementById('center-body');
  const renderFn = currentCase.render[src];
  body.innerHTML = renderFn ? renderFn() : '';
  bindClues();
}

function bindClues() {
  document.querySelectorAll('#center-body .clue:not(.collected)').forEach(el => {
    if (!el.dataset.bound) { el.dataset.bound = '1'; el.addEventListener('click', () => collectClue(el.dataset.clue)); }
  });
}

// ==================== CLUE SYSTEM ====================
function collectClue(clueId) {
  if (collected[clueId]) return;
  collected[clueId] = true;

  document.querySelectorAll(`[data-clue="${clueId}"]`).forEach(el => el.classList.add('collected'));

  const clue = currentCase.clues.find(c => c.id === clueId);
  if (!clue) return;

  const emptyEl = document.getElementById('empty-evidence');
  if (emptyEl) emptyEl.style.display = 'none';

  const card = document.createElement('div');
  card.className = 'evidence-card';
  card.dataset.clueId = clueId;
  const srcInfo = currentCase.sources[clue.src];
  card.innerHTML = `
    <div class="ev-source">${srcInfo ? srcInfo.icon + ' ' + srcInfo.title : clue.src}</div>
    <div class="ev-text">${clue.text}</div>
    <div class="ev-icon">+</div>
  `;
  card.addEventListener('click', () => selectEvidence(clueId, card));
  document.getElementById('evidence-list').appendChild(card);
  document.getElementById('ev-count').textContent = Object.keys(collected).length;
  showToast('证据已收集');
}

function selectEvidence(clueId, cardEl) {
  if (Object.values(answers).includes(clueId)) return;
  document.querySelectorAll('.evidence-card.selected').forEach(c => c.classList.remove('selected'));
  if (selectedClue === clueId) { selectedClue = null; return; }
  selectedClue = clueId;
  cardEl.classList.add('selected');
  if (activeBlank) fillBlank(activeBlank, clueId);
}

// ==================== DEDUCTION ====================
function openDeduction() {
  if (Object.keys(collected).length < 5) { showToast('需要至少5条证据才能构建案情报告'); return; }
  document.getElementById('deduction-overlay').classList.add('open');
  document.getElementById('right-panel').style.zIndex = '510';
  document.getElementById('right-panel').style.borderLeft = '2px solid var(--accent)';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('next-case-btn').style.display = 'none';
  renderDeduction();
  selectedClue = null;
  activeBlank = null;
}

function closeDeduction() {
  document.getElementById('deduction-overlay').classList.remove('open');
  document.getElementById('right-panel').style.zIndex = '';
  document.getElementById('right-panel').style.borderLeft = '';
  activeBlank = null;
  selectedClue = null;
  document.querySelectorAll('.evidence-card.selected').forEach(c => c.classList.remove('selected'));
}

function renderDeduction() {
  const container = document.getElementById('deduction-text');
  let html = '';
  for (const part of currentCase.template) {
    if (typeof part === 'string') { html += part.replace(/\n/g, '<br>'); }
    else {
      const filled = answers[part.blank];
      if (filled) {
        const clue = currentCase.clues.find(c => c.id === filled);
        html += `<span class="deduction-blank filled" data-blank="${part.blank}" title="点击清除">${clue ? clue.text : filled}</span>`;
      } else {
        html += `<span class="deduction-blank" data-blank="${part.blank}">[${part.label}]</span>`;
      }
    }
  }
  container.innerHTML = html;

  container.querySelectorAll('.deduction-blank:not(.filled)').forEach(b => {
    b.addEventListener('click', () => {
      activeBlank = b.dataset.blank;
      container.querySelectorAll('.deduction-blank').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      showToast('在右侧证据档案中选择一项');
    });
  });
  container.querySelectorAll('.deduction-blank.filled').forEach(b => {
    b.addEventListener('click', () => clearBlank(b.dataset.blank));
  });
}

function fillBlank(blankId, clueId) {
  const oldClue = answers[blankId];
  if (oldClue) document.querySelectorAll(`.evidence-card[data-clue-id="${oldClue}"]`).forEach(c => c.classList.remove('assigned'));
  answers[blankId] = clueId;
  document.querySelectorAll(`.evidence-card[data-clue-id="${clueId}"]`).forEach(c => { c.classList.add('assigned'); c.classList.remove('selected'); });
  selectedClue = null; activeBlank = null;
  renderDeduction();
}

function clearBlank(blankId) {
  const clueId = answers[blankId];
  if (!clueId) return;
  delete answers[blankId];
  document.querySelectorAll(`.evidence-card[data-clue-id="${clueId}"]`).forEach(c => c.classList.remove('assigned'));
  document.querySelectorAll('.evidence-card.selected').forEach(c => c.classList.remove('selected'));
  selectedClue = null; activeBlank = null;
  renderDeduction();
}

function submitDeduction() {
  let correct = 0;
  const total = currentCase.blanks.length;
  const details = [];
  for (const b of currentCase.blanks) {
    const ans = answers[b.id];
    if (ans && b.answers.includes(ans)) { correct++; details.push({ label: b.label, ok: true }); }
    else { details.push({ label: b.label, ok: false }); }
  }
  const area = document.getElementById('result-area');
  if (correct === total) {
    area.innerHTML = `<div style="font-size:28px;margin-bottom:8px;">✓</div><div style="color:var(--success);">案情推理完全正确</div><div style="font-size:12px;color:var(--text-dim);margin-top:12px;line-height:1.8;">${currentCase.conclusion}</div>`;
    if (!completedCases.includes(currentCase.id)) {
      completedCases.push(currentCase.id);
      saveProgress();
    }
    document.getElementById('next-case-btn').style.display = 'block';
  } else {
    const detailHtml = details.map(d => d.ok ? `<span style="color:var(--success);">✓ ${d.label}</span>` : `<span style="color:var(--danger);">✗ ${d.label}</span>`).join(' · ');
    area.innerHTML = `<div style="color:var(--accent);">正确 ${correct} / ${total}</div><div style="font-size:11px;margin-top:8px;">${detailHtml}</div><div style="font-size:11px;color:var(--text-faint);margin-top:8px;">点击已填写的空白可以清除后重新选择</div>`;
  }
}

function goNextCase() {
  const caseIds = Object.keys(CASES);
  const idx = caseIds.indexOf(currentCase.id);
  if (idx >= 0 && idx + 1 < caseIds.length) {
    startCase(caseIds[idx + 1]);
  } else {
    showTitle();
  }
}

// ==================== INIT ====================
renderCaseGrid();
</script>
</body>
</html>
