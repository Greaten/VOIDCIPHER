<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗室 - 文字冒险解密</title>
<style>
:root {
    --bg: #0d0d0d; --panel: #1a1a1a; --bubble-self: #2b5c2b; --bubble-other: #2a2a2a;
    --text: #c8c8c8; --text-light: #a0a0a0; --accent: #4a9e4a; --danger: #8b3a3a;
    --divider: #252525; --input-bg: #1e1e1e; --border: #333;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: #000; font-family: 'Microsoft YaHei','PingFang SC',sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
body::after { content: ''; position: fixed; top:0;left:0;right:0;bottom:0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px); pointer-events: none; z-index: 999; }
body::before { content: ''; position: fixed; top:0;left:0;right:0;bottom:0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 998; opacity: 0.5; }
.app-container { width: 520px; height: 780px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 1; box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 80px rgba(0,0,0,0.3); }
.status-bar { background: #0a0a0a; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-light); border-bottom: 1px solid var(--divider); letter-spacing: 1px; flex-shrink: 0; }
.status-bar .title { color: var(--accent); font-weight: bold; font-size: 12px; text-shadow: 0 0 8px rgba(74,158,74,0.4); }
.status-bar .indicators span { margin-left: 8px; }
.main-content { display: flex; flex: 1; overflow: hidden; }

/* ===== 左侧联系人栏 ===== */
.contact-sidebar { width: 85px; background: #080808; border-right: 1px solid var(--divider); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; flex-shrink: 0; }
.contact-sidebar::-webkit-scrollbar { width: 3px; }
.contact-sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
.contact-sidebar .sidebar-divider { height: 1px; background: var(--divider); margin: 4px 10px; flex-shrink: 0; }
.sidebar-tab { display: flex; flex-direction: column; align-items: center; padding: 10px 4px; cursor: pointer; position: relative; border-left: 2px solid transparent; transition: all 0.2s; flex-shrink: 0; }
.sidebar-tab:hover { background: #0f0f0f; }
.sidebar-tab.active { background: #0e1a0e; border-left-color: var(--accent); }
.sidebar-tab.locked { opacity: 0.35; cursor: not-allowed; }
.sidebar-tab.locked:hover { background: transparent; }
.sidebar-tab.raven-item { padding-bottom: 6px; }
.sidebar-tab .sb-avatar { width: 36px; height: 36px; border-radius: 50%; background: #141414; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 16px; position: relative; flex-shrink: 0; }
.sidebar-tab.raven-item .sb-avatar { border-color: #1a3a1a; background: #0d140d; }
.sidebar-tab.active .sb-avatar { border-color: var(--accent); box-shadow: 0 0 6px rgba(74,158,74,0.25); }
.sidebar-tab .sb-name { font-size: 10px; color: var(--text-light); margin-top: 4px; text-align: center; line-height: 1.2; max-width: 75px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-tab.active .sb-name { color: var(--accent); }
.sidebar-tab .sb-badge { position: absolute; top: 10px; right: 8px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; box-shadow: 0 0 4px rgba(139,58,58,0.5); z-index: 2; }
.sidebar-tab .sb-badge.show { display: block; }

/* ===== 右侧聊天区 ===== */
.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.header { background: var(--panel); padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--divider); flex-shrink: 0; }
.header .back-btn { color: var(--accent); font-size: 18px; cursor: pointer; user-select: none; transition: opacity 0.2s; }
.header .back-btn:hover { opacity: 0.7; }
.header .contact-name { flex: 1; font-size: 15px; font-weight: bold; color: var(--text); letter-spacing: 0.5px; }
.header .contact-status { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.chat-area { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.time-divider { text-align: center; font-size: 11px; color: #555; margin: 6px 0; letter-spacing: 0.5px; }
.sys-msg { text-align: center; font-size: 11px; color: #555; font-style: italic; padding: 4px 0; }
.sys-msg.warn { color: var(--danger); }
.sys-msg.accent { color: var(--accent); }
.msg-row { display: flex; flex-direction: column; max-width: 78%; animation: msgIn 0.3s ease-out; }
.msg-row.self { align-self: flex-end; align-items: flex-end; }
.msg-row.other { align-self: flex-start; align-items: flex-start; }
.msg-row.raven { align-self: flex-start; align-items: flex-start; }
.msg-sender { font-size: 10px; color: var(--text-light); margin-bottom: 2px; padding: 0 4px; }
.msg-row.raven .msg-sender { color: #6a9e6a; letter-spacing: 1px; }
.msg-bubble { padding: 9px 13px; border-radius: 4px; font-size: 13px; line-height: 1.65; word-break: break-word; position: relative; letter-spacing: 0.3px; }
.msg-row.self .msg-bubble { background: var(--bubble-self); color: #b8d8b8; border: 1px solid #3a703a; }
.msg-row.other .msg-bubble { background: var(--bubble-other); color: var(--text); border: 1px solid #333; }
.msg-row.raven .msg-bubble { background: #0f1a0f; color: #8abf8a; border: 1px solid #1a3a1a; font-style: italic; }
.typing-indicator { align-self: flex-start; padding: 10px 14px; background: var(--bubble-other); border-radius: 4px; border: 1px solid #333; display: flex; gap: 4px; animation: msgIn 0.2s ease-out; }
.typing-indicator span { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: typingBounce 1.2s infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
@keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.choices-area { align-self: stretch; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; animation: msgIn 0.35s ease-out; }
.choice-btn { width: 100%; padding: 11px 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; cursor: pointer; text-align: left; transition: all 0.2s; letter-spacing: 0.3px; }
.choice-btn:hover { background: #252525; border-color: var(--accent); color: var(--accent); }
.choice-btn:active { background: #1a2e1a; transform: scale(0.98); }
.choice-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.input-area { background: var(--panel); padding: 10px 12px; display: flex; gap: 10px; border-top: 1px solid var(--divider); align-items: center; flex-shrink: 0; }
.input-area input { flex: 1; padding: 10px 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s; }
.input-area input:focus { border-color: var(--accent); }
.input-area input::placeholder { color: #444; }
.input-area button { padding: 10px 18px; background: var(--accent); border: none; border-radius: 4px; color: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
.input-area button:hover { background: #5aae5a; }
.input-area button:active { transform: scale(0.96); }
.input-area button:disabled { background: #2a3a2a; color: #555; cursor: not-allowed; }
.accuse-overlay { position: absolute; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.92); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
.accuse-overlay.show { display: flex; }
.accuse-overlay h3 { color: var(--danger); font-size: 18px; margin-bottom: 20px; letter-spacing: 2px; }
.accuse-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 360px; }
.accuse-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
.accuse-card:hover { border-color: var(--accent); background: #1a1a1a; }
.accuse-card .card-name { color: var(--text); font-size: 14px; font-weight: bold; }
.accuse-card .card-role { color: var(--text-light); font-size: 11px; margin-top: 4px; }
.accuse-cancel { margin-top: 16px; padding: 8px 30px; background: transparent; border: 1px solid #555; border-radius: 4px; color: #555; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.accuse-cancel:hover { border-color: #999; color: #999; }
@media (max-width: 540px) { .app-container { width: 100vw; height: 100vh; border-radius: 0; border: none; } }
</style>
</head>

    D.ot('还有苏姐，教了我很多公司常识！比如"不要让韩冰姐抓到合同格式问题"、"财务赵总不喜欢电子发票截图"之类的。',900),
    D.se('28号那天你在做什么？'),
    D.ot('周五嘛，我在公司加班！整理测试用例文档。秦哥白天请假了，他的任务我帮忙盯着。',800),
    D.ot('那天公司人好少。薇姐最近特别焦虑，有一次我看到她在删聊天记录——也许是隐私吧，我没好意思问。',800),
],
stage2: [
    D.se('吴天，你有没有注意到什么不寻常的事？'),
    D.ot('唔...我说了你不要觉得我多嘴。',700),
    D.ot('上个月有个周六，我加班到凌晨两点——看到韩冰姐的办公室灯亮着。',800),
    D.ot('我本来想打个招呼，但她在看一台银色的笔记本电脑。不是公司的ThinkPad。不过也可能是我看错了——太困了。',900),
    D.ot('不过说真的，韩姐一直很敬业，也可能她真的在加班。她是我们公司最认真的人之一。',800),
    D.ot('相比起来——薇姐最近特别焦虑，还删聊天记录，这不正常。还有周经理让我帮她做过一份竞品分析，里面有些数据我根本查不到来源。',1000),
    D.ot('雨晴姐什么都知道，消息来源肯定不干净。她知道好多连HR都不知道的事。',700),
],
stage3: [
    D.se('你确定那天是周六凌晨？'),
    D.ot('确定。因为我女朋友周六要来，我周五晚上通宵加班就是为了周末空出来。',900),
    D.ot('所以我记得特别清楚。六月的倒数第二个周六。凌晨两点多。',800),
    D.ot('后来我旁敲侧击问韩姐周末是不是也加班，她说"没有啊，周末在家休息"。但也可能只是她忘了——谁记得清自己哪天加了班呢。',900),
    D.ot('我没敢追问。毕竟她是法务部的前辈，我只是个实习生。',700),
    D.ot('其实我家里经济状况不太好，爸爸生病需要钱。我很需要这份工作。但这不代表我会做傻事。',800),
    D.ot('倒是周经理那个竞品分析的事我一直很在意——那些数据从哪来的？',700),
],
},};

// ============================================================
// 游戏状态
// ============================================================
const GameState = {
    currentContact:'raven', currentStage:'raven_opening',
    characterStages:{}, interactedChars:new Set(), clues:[],
    hasUnread:{},
    allCharsReviewed:false, ravenMidTriggered:false, ravenFinalTriggered:false,
    gamePhase:'opening', spyRevealed:false, sequencePlaying:false,
    accuseAttempts:0, maxAccuseAttempts:2
};
Object.keys(CHARACTERS).forEach(id=>{if(id!=='raven'){GameState.characterStages[id]='stage1';GameState.hasUnread[id]=false;}});

// ============================================================
// UI
// ============================================================
function sb(){const c=document.getElementById('chatArea');setTimeout(()=>{c.scrollTop=c.scrollHeight;},30);}
function asm(t,cls){const c=document.getElementById('chatArea');const d=document.createElement('div');d.className='sys-msg'+(cls?' '+cls:'');d.textContent=t;c.appendChild(d);sb();}
function atd(t){const c=document.getElementById('chatArea');const d=document.createElement('div');d.className='time-divider';d.textContent=t;c.appendChild(d);sb();}
function am(side,t,sn){const c=document.getElementById('chatArea');const r=document.createElement('div');r.className='msg-row '+side;if(side==='other'||side==='raven'){const s=document.createElement('div');s.className='msg-sender';s.textContent=sn||CHARACTERS[GameState.currentContact]?.name||'';r.appendChild(s);}const b=document.createElement('div');b.className='msg-bubble';b.textContent=t;r.appendChild(b);c.appendChild(r);sb();}
async function st(dur){const c=document.getElementById('chatArea');const i=document.createElement('div');i.className='typing-indicator';i.innerHTML='<span></span><span></span><span></span>';c.appendChild(i);sb();await sleep(dur||800);i.remove();}
function sc(choices){const c=document.getElementById('chatArea');const con=document.createElement('div');con.className='choices-area';con.id='choicesContainer';choices.forEach((ch,i)=>{const b=document.createElement('button');b.className='choice-btn';b.textContent=(i+1)+'. '+ch.label;b.onclick=()=>{con.querySelectorAll('button').forEach(btn=>btn.disabled=true);con.remove();if(ch.next)playRavenSeq(ch.next);if(ch.action)ch.action();};con.appendChild(b);});c.appendChild(con);sb();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ============================================================
// 播放
// ============================================================
async function playSeq(seq){if(GameState.sequencePlaying)return;GameState.sequencePlaying=true;for(const m of seq){await sleep(m.delay||400);if(m.type==='time')atd(m.text);else if(m.type==='sys')asm(m.text,m.color);else if(m.type==='raven'){await st(Math.min(m.delay,700));am('raven',m.text,'渡鸦');}else if(m.type==='other'){await st(Math.min(m.delay,700));am('other',m.text,CHARACTERS[GameState.currentContact]?.name);}else if(m.type==='self')am('self',m.text);else if(m.type==='choice'){sc([m]);GameState.sequencePlaying=false;return;}else if(m.type==='action')handleAction(m.value);}GameState.sequencePlaying=false;checkRavenTrigger();}
async function playRavenSeq(name){GameState.currentContact='raven';GameState.currentStage=name;updateHeader();updateTabs();await playSeq(ALL_SCRIPTS[name]||[]);}
async function playStageSeq(seq){GameState.sequencePlaying=true;for(const m of seq){await sleep(m.delay||400);if(m.type==='time')atd(m.text);else if(m.type==='sys')asm(m.text,m.color);else if(m.type==='other'){await st(Math.min(m.delay,700));am('other',m.text,CHARACTERS[GameState.currentContact]?.name);}else if(m.type==='self')am('self',m.text);else if(m.type==='choice'){sc([m]);GameState.sequencePlaying=false;return;}else if(m.type==='action')handleAction(m.value);}GameState.sequencePlaying=false;checkRavenTrigger();}
function handleAction(v){if(v==='unlock_all'){Object.keys(CHARACTERS).forEach(id=>{if(id!=='raven'){CHARACTERS[id].locked=false;GameState.hasUnread[id]=true;}});GameState.gamePhase='investigation';updateTabs();updateHeader();switchContact('linwei');}else if(v==='trigger_accuse'){GameState.gamePhase='accusation';showAccuseOverlay();}else if(v==='hanbing_confront_done'){GameState.hasUnread['raven']=true;GameState.currentStage='raven_final_p2';GameState['_h_raven_final_p2']=false;updateTabs();}}

// ============================================================
// 联系人切换
// ============================================================
function switchContact(charId){if(GameState.sequencePlaying)return;const char=CHARACTERS[charId];if(!char)return;if(char.locked){asm('⚠ 该联系人尚未解锁','warn');return;}GameState.currentContact=charId;if(charId!=='raven'){GameState.hasUnread[charId]=false;}updateHeader();updateTabs();document.getElementById('chatArea').innerHTML='';if(charId==='raven'){const stage=GameState.currentStage;if(stage==='raven_opening'&&!GameState._h_ro){GameState._h_ro=true;playSeq(ALL_SCRIPTS.raven_opening);}else if(ALL_SCRIPTS[stage]&&!GameState['_h_'+stage]){GameState['_h_'+stage]=true;playSeq(ALL_SCRIPTS[stage]);}else{asm('— 加密频道待命中 —','accent');asm('等待指令...');}return;}const scripts=ALL_SCRIPTS[charId];if(!scripts)return;const cs=GameState.characterStages[charId]||'stage1';const sk='_v_'+charId+'_'+cs;if(!GameState[sk]){GameState[sk]=true;const seq=scripts[cs];if(seq){playStageSeq(seq);GameState.interactedChars.add(charId);addClue(charId,cs);}}else{const ns=nextStage(charId,cs);if(ns&&scripts[ns]){asm('— 之前的对话 —','accent');const seq=scripts[cs];if(seq){seq.filter(m=>m.type==='other').forEach(m=>am('other',m.text,char.name));seq.filter(m=>m.type==='self').forEach(m=>am('self',m.text));}asm('暂时没有新消息','accent');}else{asm('— 之前的对话 —','accent');const seq=scripts[cs];if(seq){seq.filter(m=>m.type==='other').forEach(m=>am('other',m.text,char.name));seq.filter(m=>m.type==='self').forEach(m=>am('self',m.text));}asm('暂无更多线索','accent');}}}
function nextStage(charId,stage){if(stage==='stage1')return'stage2';if(stage==='stage2'){if(charId==='hanbing')return'stage3';return'stage3';}if(stage==='stage3'&&charId==='hanbing')return'confront';return null;}
function addClue(charId,stage){const char=CHARACTERS[charId];const ex=GameState.clues.find(c=>c.charId===charId&&c.stage===stage);if(ex)return;GameState.clues.push({charId,stage,name:char.name,time:new Date().toLocaleTimeString()});updateCluePanel();scheduleNextStage(charId,stage);checkAllReviewed();}
function updateCluePanel(){}

function scheduleNextStage(charId,cs){const next=nextStage(charId,cs);if(!next)return;const nk='_n_'+charId+'_'+next;if(GameState[nk])return;GameState[nk]=true;const hints={linwei:{stage2:'对了，我刚又翻了下日志，有点奇怪的东西。你有空看看。',stage3:'等等...我刚才重新跑了一遍那个时间段的日志——你绝对想看看。'},chenhao:{stage2:'还有一件事。刚才不方便说。',stage3:'上次说的不够清楚。有时间过来一趟。'},suyuqing:{stage2:'啊对了对了！我突然想起来一个细节！超重要的！',stage3:'完了完了，我刚又打听到一个大瓜...这次真的劲爆！'},zhaomingyuan:{stage2:'刚才我说的——你再看看，有些话不方便明说。',stage3:'我又翻了一下账簿。有个数字不太对。'},zhouruo:{stage2:'等下，我刚才想到一个人。',stage3:'我刚查了下访客记录——你想不到谁来过。'},qinfeng:{stage2:'...那个，我其实还有话没说完。',stage3:'我...我又想起一件事。可能跟你要查的有关。'},hanbing:{stage2:'补充一点。从合规角度，有个细节你需要知道。',stage3:'又发现一个问题。关于咨询合同的条款——有点意思。'},wutian:{stage2:'前辈！我刚想起来一件事！',stage3:'我又想起来一件事...这次真的！关于周六晚上的！'}};const h=hints[charId]&&hints[charId][next]?hints[charId][next]:'有新的消息';setTimeout(()=>{GameState.characterStages[charId]=next;GameState.hasUnread[charId]=true;if(!GameState.sequencePlaying){asm(CHARACTERS[charId].name+'：'+h,'accent');}updateTabs();checkAllReviewed();},3000+Math.random()*2000);}
function checkAllReviewed(){if(GameState.allCharsReviewed)return;const ids=Object.keys(CHARACTERS).filter(i=>i!=='raven');const allReviewed=ids.every(id=>{const s=GameState.characterStages[id];if(id==='hanbing')return s==='confront'||s==='done';return s==='stage3'||s==='stage2'||s==='confront'||s==='done';});if(allReviewed){GameState.allCharsReviewed=true;if(!GameState.ravenMidTriggered){GameState.ravenMidTriggered=true;GameState.hasUnread['raven']=true;GameState.currentStage='raven_mid';updateTabs();if(!GameState.sequencePlaying){asm('渡鸦频道有新消息','accent');}}}}
function autoMid(){const ids=Object.keys(CHARACTERS).filter(i=>i!=='raven');const allDeep=ids.every(id=>{const s=GameState.characterStages[id];return s==='stage3'||s==='confront'||s==='done';});if(allDeep&&!GameState.ravenFinalTriggered){GameState.ravenFinalTriggered=true;GameState.hasUnread['raven']=true;GameState.currentStage='raven_final';updateTabs();if(!GameState.sequencePlaying){asm('渡鸦频道信号增强...','accent');}}}
function checkRavenTrigger(){if(GameState.allCharsReviewed&&!GameState.ravenFinalTriggered){setTimeout(()=>{if(!GameState.sequencePlaying)autoMid();},1500);}}

// ============================================================
// 指认
// ============================================================
function showAccuseOverlay(){const o=document.getElementById('accuseOverlay');const g=document.getElementById('accuseGrid');g.innerHTML='';Object.values(CHARACTERS).filter(c=>c.id!=='raven').forEach(char=>{const card=document.createElement('div');card.className='accuse-card';card.innerHTML=`<div class="card-name">${char.avatar} ${char.name}</div><div class="card-role">${char.role}</div>`;card.onclick=()=>makeAccuse(char.id);g.appendChild(card);});o.classList.add('show');}
function cancelAccuse(){document.getElementById('accuseOverlay').classList.remove('show');}
function makeAccuse(charId){document.getElementById('accuseOverlay').classList.remove('show');GameState.gamePhase='ending';GameState.accuseAttempts++;const ca=document.getElementById('chatArea');ca.innerHTML='';const char=CHARACTERS[charId];asm('⚠ 你指认了：'+char.name,'warn');am('self','我确定。间谍就是'+char.name+'。');setTimeout(async()=>{if(charId==='hanbing'){await playCorrect();}else{await playWrong(charId);}},1000);}

async function playCorrect(){GameState.spyRevealed=true;GameState.currentContact='raven';GameState.currentStage='raven_accuse_correct';updateHeader();updateTabs();GameState.characterStages['hanbing']='confront';GameState.hasUnread['hanbing']=true;updateTabs();document.getElementById('chatArea').innerHTML='';playSeq(ALL_SCRIPTS.raven_accuse_correct);}

async function playWrong(charId){GameState.currentContact='raven';updateHeader();updateTabs();await st(1000);
if(GameState.accuseAttempts>=GameState.maxAccuseAttempts){
am('raven','这是你第二次指认错误。','渡鸦');await sleep(800);await st(900);
am('raven','算了。我直接告诉你吧。间谍是韩冰。','渡鸦');await sleep(1000);await st(1000);
am('raven','仔细回想她跟所有人的对话——她总在把嫌疑引向别人。她从不出错。她掌握所有关键信息却永远让自己看起来只是"按流程办事"。','渡鸦');await sleep(1200);
asm('提示：', 'accent');asm('韩冰的VPN借给秦风不是好心——是嫁祸。','accent');asm('法务咨询费流向了星辰科技的关联账户。','accent');asm('她说"周末在休息"，但有人周六凌晨看到她在办公室。','accent');asm('她调取了门禁记录，却对安保部门只字不提。','accent');
GameState.characterStages['hanbing']='confront';GameState.hasUnread['hanbing']=true;GameState.ravenFinalTriggered=false;GameState['_h_raven_final']=false;GameState.gamePhase='investigation';updateTabs();sc([{label:'查看韩冰的最终对话',action:()=>switchContact('hanbing')}]);
}else{
const wrongMsgs={linwei:'她有root权限，但泄密用的是VPN——她不需要VPN就能访问。你再想想。',chenhao:'安保漏洞是事实，但他如果真想做，不会留下那么明显的日志空白。',suyuqing:'她确实知道太多。但信息多不等于信息源有问题。她只是爱打听。',zhaomingyuan:'卖房款有契税证明。真正可疑的钱不走明账。',zhouruo:'她跟星辰科技接触最多——但正因如此她才最显眼。间谍不会这么招摇。',qinfeng:'他的IP确实吻合。但太吻合了。像是故意留下的痕迹。',wutian:'入职时间吻合——但他连测试数据库都会误删。间谍不会这么冒失。'};const msg=wrongMsgs[charId]||'别急着下结论。回到对话里去找——矛盾在哪里？';const msgs=[[msg,1800],['看清楚每个人的自相矛盾之处。然后再告诉我。',1400]];
for(const m of msgs){await st(m[1]);am('raven',m[0],'渡鸦');}
GameState.gamePhase='investigation';GameState.ravenFinalTriggered=false;GameState['_h_raven_final']=false;
sc([{label:'继续调查',action:()=>{}}]);
}
}

// ============================================================
// UI更新
// ============================================================
function updateHeader(){const char=CHARACTERS[GameState.currentContact];if(!char)return;document.getElementById('contactName').textContent=char.name;document.getElementById('contactStatus').textContent=char.desc||'在线';}
function updateTabs(){const tabs=document.getElementById('contactTabs');tabs.innerHTML='';let isFirstSuspect=true;Object.values(CHARACTERS).forEach(char=>{if(char.id!=='raven'&&isFirstSuspect){const d=document.createElement('div');d.className='sidebar-divider';tabs.appendChild(d);isFirstSuspect=false;}const t=document.createElement('div');t.className='sidebar-tab';t.id='tab-'+char.id;if(char.id==='raven')t.classList.add('raven-item');if(char.locked)t.classList.add('locked');if(char.id===GameState.currentContact)t.classList.add('active');const showBadge=char.id!=='raven'&&GameState.hasUnread[char.id];const nameDisplay=char.id==='raven'?'渡鸦':char.name;t.innerHTML=`<div class="sb-avatar">${char.avatar}<span class="sb-badge" id="badge-${char.id}" style="${showBadge?'display:block':''}"></span></div><div class="sb-name">${nameDisplay}</div>`;t.onclick=()=>{if(!char.locked)switchContact(char.id);else asm('⚠ 该联系人尚未解锁','warn');};tabs.appendChild(t);});}

function showContactList(){if(GameState.sequencePlaying)return;const ca=document.getElementById('chatArea');ca.innerHTML='';document.getElementById('contactName').textContent='联系人';document.getElementById('contactStatus').textContent='选择一个对话';document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));appendCard(CHARACTERS['raven']);asm('—— 嫌疑人 ——');Object.values(CHARACTERS).filter(c=>c.id!=='raven').forEach(c=>appendCard(c));}
function appendCard(char){const ca=document.getElementById('chatArea');const stage=GameState.characterStages[char.id];const reviewed=stage==='stage2'||stage==='stage3'||stage==='confront'||stage==='done';const row=document.createElement('div');row.style.cssText=`display:flex;align-items:center;gap:10px;padding:11px 10px;margin:2px 0;cursor:${char.locked?'not-allowed':'pointer'};border-radius:4px;transition:background 0.2s;opacity:${char.locked?'0.4':'1'};`;if(!char.locked){row.onmouseenter=()=>row.style.background='#1a1a1a';row.onmouseleave=()=>row.style.background='transparent';row.onclick=()=>switchContact(char.id);}row.innerHTML=`<div style="width:38px;height:38px;border-radius:50%;background:#1a1a1a;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:16px;">${char.avatar}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><span style="color:var(--text);font-size:14px">${char.name}</span>${reviewed?'<span style="color:var(--accent);font-size:10px">✓</span>':''}</div><div style="color:var(--text-light);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${char.role} · ${char.desc}</div></div>${char.locked?'<div style="font-size:11px;color:#555">🔒</div>':''}`;ca.appendChild(row);}

function sendMessage(){const input=document.getElementById('msgInput');const text=input.value.trim();if(!text||GameState.sequencePlaying||GameState.spyRevealed)return;const char=CHARACTERS[GameState.currentContact];if(!char||!char.online){asm('对方当前离线');input.value='';return;}am('self',text);input.value='';setTimeout(()=>{if(GameState.currentContact==='raven'){am('raven','...继续调查。注意对话里自相矛盾的地方。','渡鸦');}else{const stage=GameState.characterStages[GameState.currentContact];if(stage==='stage1')am('other','这个嘛...我觉得你可能需要多问几个人。每个人看到的碎片都不一样。',CHARACTERS[GameState.currentContact].name);else if(stage==='stage2')am('other','我能说的已经说完了。剩下的需要你自己去比对。',CHARACTERS[GameState.currentContact].name);else am('other','（对方似乎没有更多信息了）',CHARACTERS[GameState.currentContact].name);}},1200);}

function updateClock(){const n=new Date();document.getElementById('clockDisplay').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');const lvl=Math.max(5,15-Math.floor((Date.now()/60000)%15));document.getElementById('batteryDisplay').textContent='⚡ '+lvl+'%';}
function init(){GameState.currentContact='raven';GameState.currentStage='raven_opening';updateHeader();updateTabs();updateClock();setInterval(updateClock,30000);document.getElementById('chatArea').innerHTML='';playSeq(ALL_SCRIPTS.raven_opening);}
document.addEventListener('DOMContentLoaded',init);
</script>
