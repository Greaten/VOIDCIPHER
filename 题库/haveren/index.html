<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面</title>
<link rel="stylesheet" href="css/desktop.css">
</head>
<body>

<!-- 桌面壁纸层 -->
<div class="wallpaper"></div>

<!-- 桌面图标网格 -->
<div class="desktop-icons" id="desktopIcons">
  <div class="desktop-icon" data-app="mail" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><rect x="6" y="10" width="36" height="28" rx="3" fill="none" stroke="currentColor" stroke-width="2.5"/><polyline points="6,12 24,26 42,12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/></svg>
    </div>
    <span class="icon-label">邮箱</span>
  </div>

  <div class="desktop-icon" data-app="browser" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><circle cx="24" cy="24" r="18" fill="none" stroke="currentColor" stroke-width="2.5"/><ellipse cx="24" cy="24" rx="8" ry="18" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="4" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2"/></svg>
    </div>
    <span class="icon-label">浏览器</span>
  </div>

  <div class="desktop-icon" data-app="chat" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><rect x="8" y="8" width="32" height="26" rx="4" fill="none" stroke="currentColor" stroke-width="2.5"/><polygon points="20,34 16,42 24,34" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    </div>
    <span class="icon-label">聊天</span>
  </div>

  <div class="desktop-icon" data-app="notes" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><rect x="12" y="4" width="24" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="16" y1="12" x2="32" y2="12" stroke="currentColor" stroke-width="2"/><line x1="16" y1="18" x2="32" y2="18" stroke="currentColor" stroke-width="2"/><line x1="16" y1="24" x2="28" y2="24" stroke="currentColor" stroke-width="2"/></svg>
    </div>
    <span class="icon-label">记事本</span>
  </div>

  <div class="desktop-icon" data-app="files" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><path d="M6 10 L6 38 L42 38 L42 16 L24 16 L18 10 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/></svg>
    </div>
    <span class="icon-label">文件</span>
  </div>

  <div class="desktop-icon" data-app="photos" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><rect x="6" y="8" width="36" height="32" rx="4" fill="none" stroke="currentColor" stroke-width="2.5"/><circle cx="16" cy="18" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M6 34 L18 22 L26 30 L34 14 L42 26 L42 40 L6 40 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/></svg>
    </div>
    <span class="icon-label">相册</span>
  </div>

  <div class="desktop-icon" data-app="shop" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><path d="M8 14 L12 40 L36 40 L40 14 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/><path d="M14 14 C14 8 20 6 24 6 C28 6 34 8 34 14" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="20" y1="22" x2="20" y2="32" stroke="currentColor" stroke-width="2.5"/><line x1="28" y1="22" x2="28" y2="32" stroke="currentColor" stroke-width="2.5"/></svg>
    </div>
    <span class="icon-label">购物</span>
  </div>

  <div class="desktop-icon ending-icon" data-app="ending" data-clue="false">
    <div class="icon-wrapper">
      <svg viewBox="0 0 48 48" class="icon-svg"><circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="2.5"/><text x="24" y="31" text-anchor="middle" font-size="24" fill="currentColor">?</text></svg>
    </div>
    <span class="icon-label">?</span>
  </div>
</div>

<!-- 应用窗口容器 -->
<div class="windows-container" id="windowsContainer"></div>

<!-- 底部任务栏 -->
<div class="taskbar">
  <div class="taskbar-left">
    <div class="taskbar-logo" title="Project Null OS">■</div>
    <div class="taskbar-time" id="taskbarTime"></div>
  </div>
  <div class="taskbar-center" id="taskbarWindows"></div>
  <div class="taskbar-right">
    <div class="taskbar-status">
      <span id="clueCount">已发现线索：0/19</span>
    </div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/main.js"></script>
</body>
</html>
