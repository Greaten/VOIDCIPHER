<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOIDCIPHER — 后台管理</title>
<style>
  :root {
    --bg-deeper: #080a0c;
    --bg-primary: #0c0f14;
    --bg-elevated: #12161d;
    --text-primary: #d4c9a8;
    --text-secondary: #8a7e6b;
    --text-muted: #564e40;
    --accent: #c8a84e;
    --accent-dim: #8a7235;
    --danger: #a84e4e;
    --danger-glow: #c84040;
    --success: #4e8a5e;
    --border: #1e241c;
    --font-mono: 'Courier New', 'Source Code Pro', 'Consolas', monospace;
    --font-system: system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deeper);
    color: var(--text-primary);
    font-family: var(--font-mono);
    min-height: 100vh;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    animation: scanline-drift 8s linear infinite;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
  }
  @keyframes scanline-drift { 0%{transform:translateY(0)} 100%{transform:translateY(4px)} }

  .noise {
    position: fixed; inset: 0; z-index: 9997; pointer-events: none; opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .shell { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; position: relative; z-index: 1; }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border); padding: 2rem 0 1.5rem; margin-bottom: 2.5rem; position: relative;
    display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;
  }
  .header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 30%; height: 1px; background: var(--accent); opacity: 0.6;
  }
  .header-title { font-size: 1.5rem; letter-spacing: 0.2em; color: var(--accent); font-weight: 700; }
  .header-sub { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.25em; }
  .header-actions { display: flex; gap: 1rem; align-items: center; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.55rem 1.25rem; font-family: var(--font-mono); font-size: 0.8rem;
    letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    border: 1px solid var(--border); background: transparent; color: var(--text-primary); text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); background: rgba(200,168,78,0.06); color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary { background: rgba(200,168,78,0.08); border-color: var(--accent-dim); color: var(--accent); font-weight: 600; }
  .btn-primary:hover { background: rgba(200,168,78,0.15); border-color: var(--accent); }
  .btn-danger { border-color: rgba(168,78,78,0.3); color: var(--danger); }
  .btn-danger:hover { border-color: var(--danger); background: rgba(168,78,78,0.08); color: var(--danger-glow); }
  .btn-sm { padding: 0.35rem 0.85rem; font-size: 0.7rem; }

  /* Section */
  .section-title {
    font-size: 0.75rem; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 0.75rem; font-family: var(--font-system); font-weight: 600;
  }
  .section-title::before { content: '#'; color: var(--accent-dim); font-family: var(--font-mono); }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Card Panel */
  .panel {
    background: var(--bg-primary); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 2rem;
  }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left; padding: 0.75rem 1rem; font-size: 0.65rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--text-muted); font-family: var(--font-system);
    border-bottom: 1px solid var(--border); font-weight: 600;
  }
  td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(200,168,78,0.03); }
  .td-title { font-weight: 600; color: var(--text-primary); letter-spacing: 0.05em; }
  .td-desc { color: var(--text-secondary); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.78rem; }
  .td-path { color: var(--text-muted); font-size: 0.7rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-actions { display: flex; gap: 0.5rem; white-space: nowrap; }

  .badge {
    display: inline-block; padding: 0.15rem 0.5rem; font-size: 0.65rem; letter-spacing: 0.1em;
    border: 1px solid var(--border); color: var(--text-secondary);
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal {
    background: var(--bg-primary); border: 1px solid var(--border); padding: 2rem;
    width: 100%; max-width: 560px; position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  .modal-title {
    font-size: 1rem; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 1.5rem;
    font-weight: 600; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
  }
  .modal-close {
    position: absolute; top: 1.25rem; right: 1.5rem;
    background: none; border: none; color: var(--text-muted); font-size: 1.2rem;
    cursor: pointer; font-family: var(--font-mono); transition: color 0.2s;
  }
  .modal-close:hover { color: var(--danger); }

  .form-group { margin-bottom: 1.25rem; }
  .form-label {
    display: block; font-size: 0.7rem; letter-spacing: 0.15em; color: var(--text-secondary);
    margin-bottom: 0.4rem; text-transform: uppercase; font-family: var(--font-system); font-weight: 600;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--bg-deeper); border: 1px solid var(--border);
    padding: 0.6rem 0.85rem; font-family: var(--font-mono); font-size: 0.85rem;
    color: var(--text-primary); letter-spacing: 0.05em; transition: border-color 0.2s;
  }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    outline: none; border-color: var(--accent); box-shadow: inset 0 0 0 1px rgba(200,168,78,0.2);
  }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
  .form-select option { background: var(--bg-primary); color: var(--text-primary); }
  .form-hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.3rem; letter-spacing: 0.08em; }
  .form-row { display: flex; gap: 1rem; }
  .form-row > * { flex: 1; }

  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border);
    padding: 0.75rem 1.5rem; font-family: var(--font-mono); font-size: 0.8rem;
    color: var(--text-primary); z-index: 21000; opacity: 0;
    animation: toast-in 0.3s ease forwards, toast-out 0.3s ease 2.2s forwards;
    pointer-events: none;
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--success); color: var(--success); }
  @keyframes toast-in { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes toast-out { from{opacity:1} to{opacity:0} }

  /* Confirm dialog */
  .confirm-text { font-size: 0.85rem; color: var(--text-secondary); margin: 0.5rem 0 1.5rem; line-height: 1.7; }
  .confirm-text strong { color: var(--text-primary); }

  .empty-state { padding: 3rem 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.12em; }

  .stats {
    display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap;
  }
  .stat-box {
    background: var(--bg-primary); border: 1px solid var(--border); padding: 1rem 1.5rem; flex: 1; min-width: 140px;
  }
  .stat-num { font-size: 1.8rem; color: var(--accent); font-weight: 700; }
  .stat-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; margin-top: 0.25rem; font-family: var(--font-system); }

  @media (max-width: 640px) {
    .shell { padding: 1rem; }
    .header { flex-direction: column; align-items: flex-start; }
    .form-row { flex-direction: column; }
    .td-desc, .td-path { max-width: 120px; }
    td { padding: 0.5rem 0.6rem; font-size: 0.75rem; }
    .stats { gap: 0.5rem; }
    .stat-box { padding: 0.75rem 1rem; min-width: 100px; }
    .stat-num { font-size: 1.3rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
  }

  /* Auth Gate */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 20000; background: var(--bg-deeper);
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .auth-card {
    background: var(--bg-primary); border: 1px solid var(--border);
    padding: 3rem 2.5rem; text-align: center; max-width: 380px; width: 100%;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  .auth-icon { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; text-shadow: 0 0 20px rgba(200,168,78,0.4); }
  .auth-title { font-size: 0.95rem; letter-spacing: 0.2em; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; }
  .auth-sub { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 1.5rem; }
  .auth-form { display: flex; flex-direction: column; gap: 1rem; }
  .auth-input {
    background: var(--bg-deeper); border: 1px solid var(--border); padding: 0.7rem 1rem;
    font-family: var(--font-mono); font-size: 1rem; color: var(--text-primary);
    text-align: center; letter-spacing: 0.2em; transition: border-color 0.2s;
  }
  .auth-input:focus { outline: none; border-color: var(--accent); box-shadow: inset 0 0 0 1px rgba(200,168,78,0.2); }
  .auth-input::placeholder { color: var(--text-muted); letter-spacing: 0.15em; }
  .auth-btn {
    padding: 0.65rem; font-family: var(--font-mono); font-size: 0.8rem;
    letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
    border: 1px solid var(--accent-dim); background: rgba(200,168,78,0.08);
    color: var(--accent); font-weight: 700; transition: all 0.2s;
  }
  .auth-btn:hover { background: rgba(200,168,78,0.15); border-color: var(--accent); }
  .auth-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .auth-error {
    margin-top: 1rem; font-size: 0.75rem; color: var(--danger);
    letter-spacing: 0.1em; animation: shake 0.4s ease;
  }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
</style>
</head>
<body>

<!-- Password Gate -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-icon">▣</div>
    <div class="auth-title">IDENTITY VERIFICATION</div>
    <div class="auth-sub">输入管理密码以继续</div>
    <form class="auth-form" id="authForm" autocomplete="off">
      <input type="password" class="auth-input" id="authPassword" placeholder="PASSWORD" autofocus>
      <button type="submit" class="auth-btn">VERIFY</button>
    </form>
    <div class="auth-error" id="authError" style="display:none">// 密码错误 · 拒绝访问</div>
  </div>
</div>

<div class="noise"></div>

<div class="shell" id="mainShell" style="display:none">

  <header class="header">
    <div>
      <div class="header-title">ADMIN PANEL</div>
      <div class="header-sub">VOIDCIPHER 游戏管理后台</div>
    </div>
    <div class="header-actions">
      <a href="index.html" class="btn btn-sm" title="返回首页">← 首页</a>
      <button class="btn btn-primary" onclick="openAddModal()">+ 添加游戏</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">游戏总数</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statCategories">0</div>
      <div class="stat-label">分类数</div>
    </div>
    <div class="stat-box">
      <div class="stat-label" style="margin-top:0.4rem">
        <span style="color:var(--success)">● 数据变更后刷新首页即可生效</span>
      </div>
    </div>
  </div>

  <!-- Game Table -->
  <div class="panel">
    <h2 class="section-title">游戏列表</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>标题</th>
            <th>描述</th>
            <th>分类</th>
            <th>难度</th>
            <th>路径</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="gameTableBody">
          <tr><td colspan="6" class="empty-state">// 暂无游戏数据 · 点击右上角 [+ 添加游戏] 开始</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div class="modal-title" id="modalTitle">添加游戏</div>
    <form id="gameForm" autocomplete="off">
      <input type="hidden" id="editIndex" value="-1">

      <div class="form-group">
        <label class="form-label">游戏标题 *</label>
        <input type="text" class="form-input" id="gameTitle" placeholder="例: BLACKBOX" required maxlength="60">
      </div>

      <div class="form-group">
        <label class="form-label">文件路径 *</label>
        <input type="text" class="form-input" id="gamePath" placeholder="例: E:\website\题库\blackbox.html" required>
        <div class="form-hint">游戏 HTML 文件的绝对路径，首页点击后将跳转此地址</div>
      </div>

      <div class="form-group">
        <label class="form-label">简介</label>
        <textarea class="form-textarea" id="gameDesc" placeholder="简要描述游戏玩法与特色..." maxlength="200"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">分类</label>
          <input type="text" class="form-input" id="gameCategory" placeholder="例: 逻辑推理" maxlength="30">
        </div>
        <div class="form-group">
          <label class="form-label">难度</label>
          <select class="form-select" id="gameDifficulty">
            <option value="简单">简单</option>
            <option value="中等" selected>中等</option>
            <option value="困难">困难</option>
            <option value="极难">极难</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">图标 (Emoji 或 HTML实体)</label>
        <input type="text" class="form-input" id="gameIcon" placeholder="例: ◣ 或 🧩" maxlength="10">
        <div class="form-hint">留空则使用默认图标</div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary" id="modalSubmitBtn">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="confirmOverlay" style="display:none">
  <div class="modal" style="max-width:420px">
    <button class="modal-close" onclick="closeConfirm()">&#x2715;</button>
    <div class="modal-title">确认删除</div>
    <div class="confirm-text">确定要删除游戏 <strong id="confirmName"></strong> 吗？此操作不可撤销。</div>
    <div class="modal-actions">
      <button type="button" class="btn" onclick="closeConfirm()">取消</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'voidcipher_games';
const ADMIN_PASSWORD = 'voidadmin';

// ── Auth Gate ──
(function() {
  const token = sessionStorage.getItem('voidcipher_auth');
  if (token) {
    // Verify token against password
    if (token === ADMIN_PASSWORD) {
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('mainShell').style.display = '';
      return;
    }
    sessionStorage.removeItem('voidcipher_auth');
  }

  document.getElementById('authForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const pwd = document.getElementById('authPassword').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('voidcipher_auth', pwd);
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('mainShell').style.display = '';
    } else {
      document.getElementById('authError').style.display = 'block';
      document.getElementById('authPassword').value = '';
      document.getElementById('authPassword').focus();
    }
  });
})();

// Default seed data
const DEFAULT_GAMES = [{
  title: 'BLACKBOX',
  path: 'E:\\website\\题库\\blackbox.html',
  desc: '经典 Blackbox 逻辑推理游戏。通过向网格发射射线，根据射线被吸收、反射或穿透的行为，推断隐藏球体的精确位置。',
  category: '逻辑推理',
  difficulty: '中等',
  icon: '◣'
}];

function getGames() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch(e) {
    return [];
  }
}

function saveGames(games) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(games));
}

function ensureDefaults() {
  if (!localStorage.getItem(STORAGE_KEY)) {
    saveGames(DEFAULT_GAMES);
  }
}

function renderTable() {
  const games = getGames();
  const tbody = document.getElementById('gameTableBody');

  if (games.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">// 暂无游戏数据 · 点击右上角 [+ 添加游戏] 开始</td></tr>';
  } else {
    tbody.innerHTML = games.map((g, i) => `
      <tr>
        <td class="td-title">${escapeHtml(g.icon || '◇')} ${escapeHtml(g.title)}</td>
        <td class="td-desc" title="${escapeHtml(g.desc)}">${escapeHtml(g.desc)}</td>
        <td><span class="badge">${escapeHtml(g.category || '-')}</span></td>
        <td><span class="badge">${escapeHtml(g.difficulty || '中等')}</span></td>
        <td class="td-path" title="${escapeHtml(g.path)}">${escapeHtml(g.path)}</td>
        <td class="td-actions">
          <button class="btn btn-sm" onclick="openEditModal(${i})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="openDeleteConfirm(${i})">删除</button>
        </td>
      </tr>
    `).join('');
  }

  updateStats(games);
}

function updateStats(games) {
  document.getElementById('statTotal').textContent = games.length;
  const cats = new Set(games.map(g => g.category).filter(Boolean));
  document.getElementById('statCategories').textContent = cats.size;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Modal ──
function openAddModal() {
  document.getElementById('editIndex').value = '-1';
  document.getElementById('modalTitle').textContent = '添加游戏';
  document.getElementById('modalSubmitBtn').textContent = '保存';
  document.getElementById('gameTitle').value = '';
  document.getElementById('gamePath').value = '';
  document.getElementById('gameDesc').value = '';
  document.getElementById('gameCategory').value = '';
  document.getElementById('gameDifficulty').value = '中等';
  document.getElementById('gameIcon').value = '';
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('gameTitle').focus();
}

function openEditModal(index) {
  const games = getGames();
  const g = games[index];
  document.getElementById('editIndex').value = index;
  document.getElementById('modalTitle').textContent = '编辑游戏';
  document.getElementById('modalSubmitBtn').textContent = '更新';
  document.getElementById('gameTitle').value = g.title;
  document.getElementById('gamePath').value = g.path;
  document.getElementById('gameDesc').value = g.desc || '';
  document.getElementById('gameCategory').value = g.category || '';
  document.getElementById('gameDifficulty').value = g.difficulty || '中等';
  document.getElementById('gameIcon').value = g.icon || '';
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

// ── Form Submit ──
document.getElementById('gameForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const index = parseInt(document.getElementById('editIndex').value);
  const game = {
    title: document.getElementById('gameTitle').value.trim(),
    path: document.getElementById('gamePath').value.trim(),
    desc: document.getElementById('gameDesc').value.trim(),
    category: document.getElementById('gameCategory').value.trim(),
    difficulty: document.getElementById('gameDifficulty').value,
    icon: document.getElementById('gameIcon').value.trim() || '◇'
  };

  if (!game.title || !game.path) {
    showToast('标题和文件路径不能为空', 'error');
    return;
  }

  const games = getGames();
  if (index === -1) {
    games.push(game);
    showToast('游戏已添加', 'success');
  } else {
    games[index] = game;
    showToast('游戏已更新', 'success');
  }

  saveGames(games);
  renderTable();
  closeModal();
});

// ── Delete ──
let deleteIndex = -1;

function openDeleteConfirm(index) {
  deleteIndex = index;
  const games = getGames();
  document.getElementById('confirmName').textContent = games[index].title;
  document.getElementById('confirmOverlay').style.display = 'flex';
}

function closeConfirm() {
  document.getElementById('confirmOverlay').style.display = 'none';
  deleteIndex = -1;
}

document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
  if (deleteIndex === -1) return;
  const games = getGames();
  const name = games[deleteIndex].title;
  games.splice(deleteIndex, 1);
  saveGames(games);
  renderTable();
  closeConfirm();
  showToast(`已删除: ${name}`, 'success');
});

// ── Toast ──
function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ── Keyboard ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('confirmOverlay').style.display === 'flex') {
      closeConfirm();
    } else if (document.getElementById('modalOverlay').style.display === 'flex') {
      closeModal();
    }
  }
});

// Click overlay to close
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

// Init
ensureDefaults();
renderTable();
</script>

</body>
</html>
