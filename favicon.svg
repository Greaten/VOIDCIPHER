<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 暗色圆角底 -->
  <rect width="64" height="64" rx="12" fill="#0c0f14"/>
  <!-- 金色菱形 -->
  <polygon points="32,12 52,32 32,52 12,32" fill="none" stroke="#c8a84e" stroke-width="3" filter="url(#glow)"/>
  <!-- 中心点 -->
  <circle cx="32" cy="32" r="4" fill="#c8a84e" filter="url(#glow)"/>
  <!-- 扫描线 -->
  <line x1="16" y1="32" x2="28" y2="32" stroke="#c8a84e" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="32" x2="48" y2="32" stroke="#c8a84e" stroke-width="1.5" opacity="0.6"/>
</svg>
